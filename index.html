<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="おだきゅうのたび">
<meta name="theme-color" content="#003087">
<title>おだきゅう でんしゃのたび</title>
<style>
/* ===================================================
   BASE
=================================================== */
:root {
  --blue:  #003087;
  --blue2: #0057b8;
  --green: #0ea572;
  --red:   #e53e3e;
  --gold:  #f5c842;
  --dark:  #1a1a2e;
  --gray:  #64748b;
  --st: env(safe-area-inset-top,    0px);
  --sb: env(safe-area-inset-bottom, 20px);
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none; user-select: none;
}
html, body {
  width: 100%; height: 100%; overflow: hidden; background: #000;
  font-family: 'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN',
               'BIZ UDPGothic', sans-serif;
}
body { display: flex; justify-content: center; }
#root { width: 100%; max-width: 430px; height: 100dvh; position: relative; overflow: hidden; }

/* ===================================================
SCREEN SYSTEM
display:none で完全に存在を消す。on クラスで出現。
=================================================== */
.scr {
position: absolute; inset: 0;
display: none;
flex-direction: column; align-items: center;
}
.scr.on {
display: flex;
animation: scrPop .34s cubic-bezier(.22,.68,0,1.2) both;
}
@keyframes scrPop {
from { opacity: 0; transform: scale(.94) translateY(16px); }
to   { opacity: 1; transform: scale(1)   translateY(0); }
}

/* ===================================================
① START
=================================================== */
#pg-start {
background: linear-gradient(175deg, #000c28 0%, #002878 50%, #0048b8 100%);
justify-content: space-between;
padding-top: calc(var(–st) + 28px);
padding-bottom: calc(var(–sb) + 36px);
}
/* 星空 */
.stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.star  {
position: absolute; border-radius: 50%; background: #fff;
animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
from { opacity: .1; transform: scale(1); }
to   { opacity: 1;  transform: scale(1.7); }
}
/* タイトル */
.s-head { text-align: center; z-index: 1; padding: 0 28px; }
.s-badge {
display: inline-block;
border: 1.5px solid rgba(255,255,255,.35); border-radius: 100px;
padding: 7px 24px; color: rgba(255,255,255,.8);
font-size: 11px; font-weight: 700; letter-spacing: 4px; margin-bottom: 20px;
}
.s-title {
color: #fff; font-size: 38px; font-weight: 900; line-height: 1.2;
text-shadow: 0 4px 32px rgba(0,0,0,.5);
}
.s-title small {
display: block; font-size: 16px; font-weight: 600;
opacity: .7; letter-spacing: 2px; margin-top: 10px;
}
/* 電車シーン */
.s-scene {
width: 100%; height: 180px; position: relative; overflow: hidden; flex-shrink: 0; z-index: 1;
}
.s-sky   { position: absolute; inset: 0; background: linear-gradient(#6ab8e8, #a8d8f0); }
.s-gnd   { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background: linear-gradient(#5cb85c, #4a9e30); }
.s-rail  { position: absolute; bottom: 36px; left: 0; right: 0; height: 9px; background: #7a6a5a; }
.s-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg, rgba(255,255,255,.35) 0 14px, transparent 14px 28px);
}
.s-train {
position: absolute; bottom: 45px; left: 50%;
transform: translateX(-50%);
display: flex; gap: 2px;
animation: tBob 2.4s ease-in-out infinite;
}
@keyframes tBob {
0%,100% { transform: translateX(-50%) translateY(0); }
50%     { transform: translateX(-50%) translateY(-8px); }
}
/* はじめるボタン */
.s-foot { width: 100%; padding: 0 24px; z-index: 1; }
.btn-start {
width: 100%; padding: 26px;
background: #fff; color: var(–blue);
border: none; border-radius: 28px;
font-size: 28px; font-weight: 900; letter-spacing: 2px;
/* 立体ボタン */
box-shadow: 0 10px 0 #c8d8f0, 0 14px 40px rgba(0,0,0,.4);
cursor: pointer;
transition: transform .08s, box-shadow .08s;
}
.btn-start:active {
transform: translateY(8px);
box-shadow: 0 2px 0 #c8d8f0, 0 4px 16px rgba(0,0,0,.3);
}

/* ===================================================
② MODE SELECT
=================================================== */
#pg-mode {
background: #eef2fb;
padding-top: calc(var(–st) + 40px);
padding-bottom: calc(var(–sb) + 28px);
gap: 28px;
}
.m-head { font-size: 28px; font-weight: 900; color: var(–blue); text-align: center; }
.m-head small { display: block; font-size: 15px; color: var(–gray); font-weight: 600; margin-top: 8px; }
.m-list {
display: flex; flex-direction: column; gap: 18px;
width: 100%; padding: 0 22px; flex: 1; justify-content: center;
}
.m-btn {
border: none; border-radius: 28px; padding: 34px 28px;
cursor: pointer; text-align: left; position: relative; overflow: hidden;
transition: transform .1s, box-shadow .1s;
}
.m-btn:active { transform: scale(.95); }
.m-btn.blue {
background: linear-gradient(140deg, #002878 0%, #005ad8 100%);
box-shadow: 0 12px 0 #001860, 0 18px 48px rgba(0,40,120,.4);
}
.m-btn.purple {
background: linear-gradient(140deg, #280040 0%, #7a0080 50%, #900020 100%);
box-shadow: 0 12px 0 #180028, 0 18px 48px rgba(40,0,64,.5);
}
.m-btn.blue:active   { transform: translateY(10px); box-shadow: 0 2px 0 #001860, 0 4px 16px rgba(0,0,0,.3); }
.m-btn.purple:active { transform: translateY(10px); box-shadow: 0 2px 0 #180028, 0 4px 16px rgba(0,0,0,.3); }
.m-name { color: #fff; font-size: 34px; font-weight: 900; }
.m-desc { color: rgba(255,255,255,.72); font-size: 14px; font-weight: 600; margin-top: 8px; line-height: 1.55; }
.m-icon { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); font-size: 72px; opacity: .22; }
.m-btn.purple .m-name { color: var(–gold); }
/* ロマンスカーボタンは星がキラキラ */
.m-btn.purple::after {
content: ‘✨’;
position: absolute; font-size: 20px;
top: 12px; left: 14px;
animation: mStar 1.4s ease-in-out infinite alternate;
}
@keyframes mStar { from{opacity:.4;transform:scale(.8);} to{opacity:1;transform:scale(1.2);} }

/* ===================================================
③ QUESTION
=================================================== */
#pg-question { background: #eef2fb; }

/* 上：電車シーン */
.q-scene {
width: 100%; height: 192px; position: relative; overflow: hidden; flex-shrink: 0;
}
.q-sky  { position: absolute; inset: 0; }
.q-sun  {
position: absolute; top: 18px; right: 28px;
width: 46px; height: 46px; border-radius: 50%;
background: radial-gradient(circle, #ffe040, #ff9800);
box-shadow: 0 0 30px rgba(255,200,0,.7);
transition: opacity .8s;
}
/* 雲 */
.q-cloud { position: absolute; background: #fff; border-radius: 50px; opacity: .88; }
.q-cloud::before,.q-cloud::after { content:’’; position:absolute; background:#fff; border-radius:50%; }
.qc1 { width:72px;height:24px;top:20px; animation:cloudMove 26s linear infinite; }
.qc1::before{width:38px;height:38px;top:-18px;left:8px;}
.qc1::after {width:28px;height:28px;top:-14px;left:34px;}
.qc2 { width:50px;height:18px;top:50px;opacity:.6; animation:cloudMove 35s linear infinite 9s; }
.qc2::before{width:26px;height:26px;top:-14px;left:6px;}
@keyframes cloudMove { from{transform:translateX(-130px);} to{transform:translateX(570px);} }

.q-blds { position:absolute;bottom:52px;left:0;right:0;height:72px;display:flex;align-items:flex-end;gap:2px;padding:0 8px; }
.q-bld  { border-radius:3px 3px 0 0; flex-shrink:0; }
.q-gnd  { position:absolute;bottom:0;left:0;right:0;height:52px; }
.q-rail { position:absolute;bottom:20px;left:0;right:0;height:9px;background:#7a6a5a; }
.q-rail::before {
content:’’;position:absolute;inset:2px 0;
background:repeating-linear-gradient(90deg,rgba(255,255,255,.35) 0 14px,transparent 14px 28px);
}

/* 問題画面の電車：ゆらゆら待機 */
.q-train {
position: absolute; bottom: 29px; left: 50%;
transform: translateX(-50%); display: flex; gap: 2px; z-index: 10;
animation: qBob 2.2s ease-in-out infinite;
}
@keyframes qBob {
0%,100% { transform: translateX(-50%) translateY(0); }
50%     { transform: translateX(-50%) translateY(-5px); }
}

/* いま */
.q-now {
width: 100%; padding: 12px 22px 10px;
background: #fff; display: flex; align-items: center; gap: 10px;
border-bottom: 2px solid #dde8f8; flex-shrink: 0;
}
.q-dot {
width: 11px; height: 11px; border-radius: 50%;
background: var(–blue); flex-shrink: 0;
box-shadow: 0 0 0 0 rgba(0,48,135,.5);
animation: dotPulse 1.8s ease-in-out infinite;
}
@keyframes dotPulse {
0%  { box-shadow: 0 0 0 0   rgba(0,48,135,.5); }
60% { box-shadow: 0 0 0 8px rgba(0,48,135,0); }
100%{ box-shadow: 0 0 0 0   rgba(0,48,135,0); }
}
.q-now-lbl { font-size: 14px; color: var(–gray); font-weight: 700; }
.q-now-nm  { font-size: 22px; font-weight: 900; color: var(–blue); }

/* 問題 ＋ ボタン */
.q-body {
flex: 1; width: 100%;
display: flex; flex-direction: column;
padding: 14px 14px calc(var(–sb) + 12px); gap: 12px; overflow: hidden;
}
.q-card {
background: #fff; border-radius: 22px; padding: 18px 20px; flex-shrink: 0;
box-shadow: 0 4px 20px rgba(0,48,135,.09);
}
.q-clabel { font-size: 11px; color: var(–blue); font-weight: 800; opacity: .55; margin-bottom: 6px; letter-spacing: 1px; }
.q-ctext  { font-size: 26px; font-weight: 900; color: var(–dark); line-height: 1.35; }

/* ===================================================
選択肢ボタン ★ 大きなおもちゃ感
=================================================== */
.q-choices { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }

.cbtn {
width: 100%;
min-height: 88px;
background: #fff;
border: 3px solid #ccddf8;
border-radius: 24px;
font-size: 24px; font-weight: 900; color: var(–dark);
cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 14px;
/* 立体感：底面の影 */
box-shadow:
0 9px 0 #a8c0e0,
0 12px 24px rgba(0,48,135,.15);
transition: transform .07s, box-shadow .07s;
-webkit-tap-highlight-color: transparent;
position: relative; overflow: hidden;
}
/* タップで凹む */
.cbtn:active {
transform: translateY(8px);
box-shadow: 0 1px 0 #a8c0e0, 0 2px 8px rgba(0,48,135,.1);
}
/* 正解 */
.cbtn.ok {
background: #c8f5e0; border-color: #0ea572; color: #064e35;
box-shadow: 0 9px 0 #068050, 0 0 0 5px rgba(14,165,114,.22), 0 12px 32px rgba(14,165,114,.3);
animation: btnOk .42s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes btnOk {
0%  { transform: scale(1)    translateY(0); }
35% { transform: scale(1.1)  translateY(-8px); }
65% { transform: scale(1.04) translateY(0); }
100%{ transform: scale(1.04) translateY(0); }
}
/* 不正解 */
.cbtn.ng {
background: #fde8e8; border-color: #f0a0a0; color: #922;
box-shadow: 0 9px 0 #f0a0a0, 0 12px 24px rgba(200,50,50,.15);
animation: btnNg .4s ease;
}
@keyframes btnNg {
0%,100%{ transform: translateX(0); }
18%    { transform: translateX(-13px); }
36%    { transform: translateX(13px); }
54%    { transform: translateX(-8px); }
72%    { transform: translateX(8px); }
}
/* 不正解後の正解ヒント */
.cbtn.hint { background: #edfaf4; border-color: #80d4aa; }

/* ロマンスカー：金色系ボタン */
.is-romance .cbtn {
border-color: #c9a22788;
box-shadow: 0 9px 0 #8a6800, 0 12px 24px rgba(140,100,0,.2);
}
.is-romance .cbtn:active {
transform: translateY(8px);
box-shadow: 0 1px 0 #8a6800, 0 2px 8px rgba(140,100,0,.1);
}
.is-romance .cbtn.ok {
background: #fff3c4; border-color: var(–gold); color: #4a3200;
box-shadow: 0 9px 0 #b08000, 0 0 0 5px rgba(245,200,66,.3), 0 12px 32px rgba(200,160,0,.4);
}

.c-icon { font-size: 26px; flex-shrink: 0; }
.c-text { flex: 1; text-align: center; line-height: 1.2; }

/* ===================================================
④ DEPARTURE「しゅっぱつ！！」
電車は JS で transform: translateX を使って動かす
=================================================== */
#pg-depart {
/* かいそく */
background: linear-gradient(170deg, #000c28 0%, #002878 55%, #0050b8 100%);
justify-content: center; gap: 0;
}
.is-romance #pg-depart {
background: linear-gradient(170deg, #1a0030 0%, #4a0078 45%, #900020 100%) !important;
}

.d-scene {
width: 100%; height: 210px; position: relative; overflow: hidden; flex-shrink: 0;
}
.d-sky  { position: absolute; inset: 0; }
.d-gnd  { position: absolute; bottom: 0; left: 0; right: 0; height: 52px; background: linear-gradient(#3a7828, #2a6018); }
.d-rail { position: absolute; bottom: 36px; left: 0; right: 0; height: 9px; background: #7a6a5a; }
.d-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg, rgba(255,255,255,.35) 0 14px, transparent 14px 28px);
}
/* 電車本体：JS が transform:translateX で動かす */
.d-train {
position: absolute; bottom: 45px;
display: flex; gap: 2px; z-index: 10;
/* 初期位置は JS で設定 */
will-change: transform;
}

/* 「しゅっぱつ！！」 */
.d-shuppatsu {
font-size: 80px; font-weight: 900; color: #fff;
letter-spacing: 2px; text-align: center; z-index: 1; line-height: 1;
text-shadow: 0 4px 40px rgba(0,0,0,.4);
animation: shuppatsuPop .52s cubic-bezier(.34,1.56,.64,1) .08s both;
margin-top: 12px;
}
@keyframes shuppatsuPop {
from { transform: scale(.08) rotate(-8deg); opacity: 0; }
to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}
.is-romance .d-shuppatsu {
color: var(–gold);
text-shadow: 0 0 60px rgba(245,200,66,.9), 0 4px 20px rgba(0,0,0,.4);
}
.d-next {
font-size: 20px; font-weight: 700;
color: rgba(255,255,255,.78); letter-spacing: 1px;
margin-top: 18px; z-index: 1;
animation: fadeUp .38s ease .38s both;
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(18px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ===================================================
⑤ ARRIVAL「とうちゃく！」
=================================================== */
#pg-arrive {
background: linear-gradient(170deg, #000c28 0%, #002878 100%);
justify-content: center;
}
.is-romance #pg-arrive {
background: linear-gradient(170deg, #1a0030 0%, #4a0078 100%) !important;
}

.a-emoji {
font-size: 108px; line-height: 1;
animation: stampIn .52s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes stampIn {
from { transform: scale(0) rotate(-28deg); opacity: 0; }
to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.a-label { font-size: 15px; color: rgba(255,255,255,.6); font-weight: 700; letter-spacing: 3px; margin-top: 28px; animation: fadeUp .38s .4s both; }
.a-name  { font-size: 52px; font-weight: 900; color: #fff; margin-top: 8px; animation: fadeUp .38s .55s both; text-shadow: 0 4px 24px rgba(0,0,0,.4); }
.a-sub   { font-size: 16px; color: rgba(255,255,255,.65); font-weight: 600; margin-top: 8px; animation: fadeUp .38s .7s both; }

/* ===================================================
⑥ GOAL
=================================================== */
#pg-goal {
background: linear-gradient(170deg, #000c28 0%, #002878 52%, #0050b8 100%);
justify-content: space-between;
padding-top: calc(var(–st) + 28px);
padding-bottom: calc(var(–sb) + 36px);
}
.is-romance #pg-goal {
background: linear-gradient(170deg, #1a0030 0%, #4a0078 48%, #900020 100%) !important;
}
/* 花火 */
.g-fw  { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.fw    { position: absolute; border-radius: 50%; animation: fwB 1.6s ease-out infinite; }
@keyframes fwB { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(7);opacity:0;} }

.g-top { text-align: center; z-index: 1; padding: 0 28px; }
.g-big {
font-size: 96px; display: block;
animation: gBounce .72s cubic-bezier(.34,1.56,.64,1) .18s both;
}
@keyframes gBounce {
from { transform: scale(0) rotate(-24deg); }
to   { transform: scale(1) rotate(0); }
}
.g-ttl { font-size: 58px; font-weight: 900; color: #fff; margin-top: 14px; animation: fadeUp .48s .62s both; text-shadow: 0 4px 24px rgba(0,0,0,.4); }
.g-sub { font-size: 18px; color: rgba(255,255,255,.72); font-weight: 600; margin-top: 8px; animation: fadeUp .48s .78s both; }

.g-stamps { display: flex; gap: 10px; justify-content: center; z-index: 1; animation: fadeUp .48s .94s both; flex-wrap: wrap; padding: 0 18px; }
.g-stamp  { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.g-box    { width: 56px; height: 56px; border-radius: 14px; background: rgba(255,255,255,.12); border: 2px solid rgba(255,255,255,.26); display: flex; align-items: center; justify-content: center; font-size: 28px; }
.g-sname  { font-size: 8px; color: rgba(255,255,255,.55); font-weight: 700; text-align: center; }

.g-foot { width: 100%; padding: 0 24px; z-index: 1; animation: fadeUp .48s 1.1s both; }
.btn-retry {
width: 100%; padding: 26px;
background: #fff; color: var(–blue);
border: none; border-radius: 28px;
font-size: 26px; font-weight: 900; letter-spacing: 2px;
box-shadow: 0 10px 0 #c8d8f0, 0 14px 40px rgba(0,0,0,.4);
cursor: pointer;
transition: transform .08s, box-shadow .08s;
}
.btn-retry:active {
transform: translateY(8px);
box-shadow: 0 2px 0 #c8d8f0, 0 4px 16px rgba(0,0,0,.3);
}

/* ===================================================
TRAIN PARTS（CSS）
=================================================== */
.tc    { position: relative; display: flex; flex-direction: column; flex-shrink: 0; }
.tb    { position: relative; border-radius: 6px 6px 3px 3px; }
.tw-r  { position: absolute; top: 7px; left: 4px; right: 4px; display: flex; gap: 3px; }
.tw    { flex: 1; height: 11px; border-radius: 2px; border: 1px solid rgba(255,255,255,.4); }
.tst   { position: absolute; bottom: 10px; left: 0; right: 0; height: 5px; }
.tws   { display: flex; justify-content: space-around; padding: 0 4px; margin-top: 1px; }
.tw2   { width: 10px; height: 10px; background: #555; border-radius: 50%; border: 2px solid #888; }
.tnose { position: absolute; left: -11px; top: 4px; width: 13px; height: 28px; border-radius: 10px 0 0 5px; border-right: none; }
/* かいそく */
.k .tb    { background: linear-gradient(180deg, #f2f2f2, #e0e0e0); border: 1px solid #ccc; }
.k .tst   { background: #003087; }
.k .tw    { background: rgba(140,210,240,.88); }
.k .tnose { background: linear-gradient(180deg, #f2f2f2, #ddd); border: 1px solid #ccc; }
/* ロマンスカー：深紅 ＋ 金帯 */
.r .tb    { background: linear-gradient(180deg, #d43030, #8a1818); border: 1px solid #701010; }
.r .tst   { background: linear-gradient(90deg, #d4a800, #f5c842, #d4a800); }
.r .tw    { background: rgba(255,210,100,.55); }
.r .tnose { background: linear-gradient(180deg, #d43030, #8a1818); border: 1px solid #701010; }

/* ===================================================
SPARKLES
=================================================== */
#sp { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
.sp {
position: absolute; pointer-events: none;
animation: spFly 1.15s ease-out forwards;
}
@keyframes spFly {
0%   { transform: scale(0) rotate(0deg);     opacity: 1; }
48%  { transform: scale(1.9) rotate(185deg); opacity: 1; }
100% { transform: scale(0) rotate(370deg) translateY(-90px); opacity: 0; }
}
/* 不正解トースト */
.toast {
position: fixed; top: 46%; left: 50%;
transform: translate(-50%,-50%);
background: var(–red); color: #fff;
font-size: 38px; font-weight: 900; padding: 18px 48px; border-radius: 24px;
z-index: 10000; pointer-events: none;
box-shadow: 0 12px 50px rgba(200,50,50,.55);
animation: toastIn .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes toastIn {
from { transform: translate(-50%,-50%) scale(.3); opacity: 0; }
to   { transform: translate(-50%,-50%) scale(1);  opacity: 1; }
}
</style>

</head>
<body>
<div id="root">

  <!-- ① スタート -->

  <div id="pg-start" class="scr on">
    <div class="stars" id="stars"></div>
    <div class="s-head">
      <div class="s-badge">おだきゅうせん</div>
      <h1 class="s-title">おだきゅう<br>でんしゃのたび<small>まちだ → しんじゅく</small></h1>
    </div>
    <div class="s-scene">
      <div class="s-sky"></div>
      <div class="s-gnd"></div>
      <div class="s-rail"></div>
      <div class="s-train" id="sTrain"></div>
    </div>
    <div class="s-foot">
      <button class="btn-start" id="btnStart">🚃 はじめる</button>
    </div>
  </div>

  <!-- ② モード選択 -->

  <div id="pg-mode" class="scr">
    <div class="m-head">でんしゃを えらんでね<small>どっちに のる？</small></div>
    <div class="m-list">
      <button class="m-btn blue"   id="btnK">
        <div class="m-name">かいそく</div>
        <div class="m-desc">ふつうの でんしゃ<br>みんなで のれるよ</div>
        <div class="m-icon">🚃</div>
      </button>
      <button class="m-btn purple" id="btnR">
        <div class="m-name">ロマンスカー</div>
        <div class="m-desc">とくべつな でんしゃ<br>✨ キラキラ だよ ✨</div>
        <div class="m-icon">🌟</div>
      </button>
    </div>
  </div>

  <!-- ③ 問題 -->

  <div id="pg-question" class="scr">
    <div class="q-scene">
      <div class="q-sky"  id="qSky"></div>
      <div class="q-sun"  id="qSun"></div>
      <div class="q-cloud qc1"></div>
      <div class="q-cloud qc2"></div>
      <div class="q-blds" id="qBlds"></div>
      <div class="q-gnd"  id="qGnd"></div>
      <div class="q-rail"></div>
      <div class="q-train" id="qTrain"></div>
    </div>
    <div class="q-now">
      <div class="q-dot"></div>
      <span class="q-now-lbl">いま：</span>
      <span class="q-now-nm" id="qNow"></span>
    </div>
    <div class="q-body">
      <div class="q-card">
        <div class="q-clabel">つぎの えきは？</div>
        <div class="q-ctext" id="qText"></div>
      </div>
      <div class="q-choices" id="qChoices"></div>
    </div>
  </div>

  <!-- ④ 出発 -->

  <div id="pg-depart" class="scr">
    <div class="d-scene">
      <div class="d-sky" id="dSky"></div>
      <div class="d-gnd"></div>
      <div class="d-rail"></div>
      <div class="d-train" id="dTrain"></div>
    </div>
    <div class="d-shuppatsu">しゅっぱつ！！</div>
    <div class="d-next" id="dNext">つぎは しんゆりがおか</div>
  </div>

  <!-- ⑤ 到着 -->

  <div id="pg-arrive" class="scr">
    <div class="a-emoji" id="aEmoji">🌸</div>
    <div class="a-label">とうちゃく！</div>
    <div class="a-name"  id="aName">しんゆりがおか</div>
    <div class="a-sub"   id="aSub"></div>
  </div>

  <!-- ⑥ ゴール -->

  <div id="pg-goal" class="scr">
    <div class="g-fw" id="gFW"></div>
    <div class="g-top">
      <span class="g-big" id="gBig">🎉</span>
      <div class="g-ttl">ゴール！</div>
      <div class="g-sub">しんじゅく に とうちゃく！</div>
    </div>
    <div class="g-stamps" id="gStamps"></div>
    <div class="g-foot">
      <button class="btn-retry" id="btnRetry">🔄 もういちど！</button>
    </div>
  </div>

  <div id="sp"></div>
</div>
<script>
/* ===================================================
   ★ ユーティリティ最優先定義（Safari対応）
   const は hoisting されないので使う前に定義必須
=================================================== */
const $ = id => document.getElementById(id);

const PAGES = [‘pg-start’,‘pg-mode’,‘pg-question’,‘pg-depart’,‘pg-arrive’,‘pg-goal’];

function go(id) {
PAGES.forEach(p => $(p).classList.remove(‘on’));
requestAnimationFrame(() => $(id).classList.add(‘on’));
}

/* ===================================================
DATA
=================================================== */
const ST = [
{n:‘まちだ’,         e:‘🏙️’, sky:‘linear-gradient(180deg,#78c0e8,#aad8f8 65%,#cce8ff)’, gnd:‘linear-gradient(#6ab84a,#4a9e2a)’, b:false},
{n:‘しんゆりがおか’, e:‘🌸’, sky:‘linear-gradient(180deg,#90d0f0,#bce4f8 65%,#d8f0ff)’, gnd:‘linear-gradient(#5aaa3a,#3a8e1a)’, b:true },
{n:‘のぼりと’,       e:‘🌊’, sky:‘linear-gradient(180deg,#a8d8f8,#cce8ff 65%,#e4f4ff)’, gnd:‘linear-gradient(#48961a,#287a08)’, b:true },
{n:‘しもきたざわ’,   e:‘🎵’, sky:‘linear-gradient(180deg,#b8c8e8,#ccd8f0 65%,#dde8f8)’, gnd:‘linear-gradient(#909098,#707078)’, b:true },
{n:‘よよぎうえはら’, e:‘🌆’, sky:‘linear-gradient(180deg,#e0c8a8,#ecd8b8 65%,#f8ecd0)’, gnd:‘linear-gradient(#808090,#606070)’, b:true },
{n:‘しんじゅく’,     e:‘🌟’, sky:‘linear-gradient(180deg,#181830,#242448 65%,#303060)’, gnd:‘linear-gradient(#585868,#383848)’, b:true },
];
const QS = [
{si:0, q:‘まちだの\nつぎは どこ？’,         a:0, cs:[‘しんゆりがおか’,‘たまがわがくえんまえ’,‘さがみおおの’]},
{si:1, q:‘しんゆりがおかの\nつぎは どこ？’, a:0, cs:[‘のぼりと’,‘よみうりランドまえ’,‘むこうがおかゆえん’]},
{si:2, q:‘のぼりとの\nつぎは どこ？’,       a:2, cs:[‘きたみ’,‘せいじょうがくえんまえ’,‘しもきたざわ’]},
{si:3, q:‘しもきたざわの\nつぎは どこ？’,   a:1, cs:[‘だいたばし’,‘よよぎうえはら’,‘さんぐうばし’]},
{si:4, q:‘よよぎうえはらの\nつぎは どこ？’, a:0, cs:[‘しんじゅく’,‘はらじゅく’,‘よよぎ’]},
];

/* ===================================================
AUDIO
=================================================== */
let _ac;
const AC = () => { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); return _ac; };

function tone(f, t, d, v = .27, tp = ‘sine’) {
try {
const ctx = AC(), o = ctx.createOscillator(), g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value = f; o.type = tp;
g.gain.setValueAtTime(0, t);
g.gain.linearRampToValueAtTime(v, t + .04);
g.gain.exponentialRampToValueAtTime(.001, t + d);
o.start(t); o.stop(t + d);
} catch (_) {}
}

const SND = {
ok:      () => { const t = AC().currentTime; [880,1100,1320,1760].forEach((f,i) => tone(f, t+i*.12, .34)); },
ng:      () => { tone(250, AC().currentTime, .32, .22, ‘sawtooth’); },
depart:  () => { const t = AC().currentTime; [523,659,784,1047,784,659,523].forEach((f,i) => tone(f, t+i*.14, .46)); },
romance: () => { const t = AC().currentTime; [523,659,784,1047,1319,1047,784,523].forEach((f,i) => tone(f, t+i*.17, .65, .22)); },
goal:    () => {
const t = AC().currentTime;
[{f:523,d:.15},{f:523,d:.15},{f:523,d:.15},{f:659,d:.5},
{f:784,d:.15},{f:784,d:.15},{f:784,d:.15},{f:1047,d:.9}]
.reduce((s,{f,d}) => { tone(f, t+s, .4, .3, ‘triangle’); return s+d; }, 0);
},
};

/* ===================================================
TRAIN BUILDER
=================================================== */
function mkTrain(isR, n = 4) {
const c = isR ? ‘r’ : ‘k’;
return Array.from({length: n}, (_, i) => {
const head = i === 0, w = head ? 66 : 57, h = 40;
return `<div class="tc ${c}"> <div class="tb" style="width:${w}px;height:${h}px"> ${head ? `<div class="tnose ${c}"></div>` : ''} <div class="tw-r"><div class="tw"></div><div class="tw"></div>${!head ? '<div class="tw"></div>' : ''}</div> <div class="tst"></div> </div> <div class="tws"><div class="tw2"></div><div class="tw2"></div></div> </div>`;
}).join(’’);
}

/* ===================================================
SPARKLES
=================================================== */
function sparkle(n = 20, isR = false) {
const layer = $(‘sp’);
const em = isR
? [‘✨’,‘⭐’,‘🌟’,‘💫’,‘👑’,‘💎’,‘🌠’,‘🎊’]
: [‘✨’,‘⭐’,‘🌟’,‘💫’,‘🎉’,‘🎊’,‘🌈’];
for (let i = 0; i < n; i++) {
const el = document.createElement(‘div’);
el.className = ‘sp’;
el.textContent = em[Math.floor(Math.random() * em.length)];
el.style.cssText = `left: ${5+Math.random()*90}%; top: ${8+Math.random()*84}%; font-size: ${18+Math.random()*34}px; animation-delay: ${Math.random()*.6}s; animation-duration: ${.9+Math.random()*.9}s;`;
layer.appendChild(el);
el.addEventListener(‘animationend’, () => el.remove());
}
}

/* ===================================================
SCENE
=================================================== */
function applyScene(idx) {
const s = ST[idx];
$(‘qSky’).style.background = s.sky;
$(‘qGnd’).style.background = s.gnd;
$(‘qSun’).style.opacity = idx >= 5 ? ‘0’ : ‘1’;
const blds = $(‘qBlds’);
blds.innerHTML = ‘’;
if (s.b) {
const Hs = [36,58,40,66,44,56,32,70,48,40,62,36];
const Ws = [24,20,28,16,26,20,22,18,30,20,24,20];
Hs.forEach((h, i) => {
const d = document.createElement(‘div’); d.className = ‘q-bld’;
d.style.cssText = `width:${Ws[i]}px;height:${h}px;background:${['#c4d4e4','#b4c8e0','#d4e0ee'][i%3]}`;
blds.appendChild(d);
});
blds.style.opacity = ‘1’;
} else {
blds.style.opacity = ‘0’;
}
}

/* ===================================================
SCREEN SWITCH
.on クラスだけで制御。style.display は触らない。
CSS: .scr { display:none }  .scr.on { display:flex }
=================================================== */
const PAGES = [‘pg-start’,‘pg-mode’,‘pg-question’,‘pg-depart’,‘pg-arrive’,‘pg-goal’];
const $ = id => document.getElementById(id);

function go(id) {
PAGES.forEach(p => $(p).classList.remove(‘on’));
requestAnimationFrame(() => $(id).classList.add(‘on’));
}

/* ===================================================
GAME STATE MACHINE
=================================================== */
const Game = (() => {
let mode = ‘kaisoku’;
let qi   = 0;
let lock = false;

function setMode(m) {
mode = m;
m === ‘romance’
? $(‘root’).classList.add(‘is-romance’)
: $(‘root’).classList.remove(‘is-romance’);
}

/* ① → ② */
function onStart() { go(‘pg-mode’); }

/* ② → ③ */
function onMode(m) {
setMode(m);
qi = 0; lock = false;
const isR = m === ‘romance’;
// 各シーンの電車を再描画
$(‘sTrain’).innerHTML = mkTrain(isR, 4);
$(‘qTrain’).innerHTML = mkTrain(isR, 4);
$(‘dTrain’).innerHTML = mkTrain(isR, 4);
// 出発シーンの空も同じ色に
$(‘dSky’).style.background = ST[0].sky;
applyScene(0);
renderQ();
go(‘pg-question’);
}

/* 問題セット */
function renderQ() {
const q = QS[qi];
$(‘qNow’).textContent = ST[q.si].n;
// 改行を <br> に変換
$(‘qText’).innerHTML = q.q.replace(/\n/g, ‘<br>’);
const icons = [‘🚉’,‘🚊’,‘🚋’];
$(‘qChoices’).innerHTML = ‘’;
q.cs.forEach((c, i) => {
const btn = document.createElement(‘button’);
btn.className = ‘cbtn’;
btn.innerHTML = `<span class="c-icon">${icons[i]}</span><span class="c-text">${c}</span>`;
btn.addEventListener(‘click’, () => onAnswer(i, btn));
$(‘qChoices’).appendChild(btn);
});
lock = false;
}

/* ③ 回答 */
function onAnswer(idx, btn) {
if (lock) return;
const q = QS[qi];
const all = document.querySelectorAll(’.cbtn’);
all.forEach(b => b.style.pointerEvents = ‘none’);

```
if (idx === q.a) {
  /* ✅ 正解 */
  lock = true;
  btn.classList.add('ok');
  SND.ok();
  sparkle(26, mode === 'romance');
  setTimeout(() => { onDepart(); go('pg-depart'); }, 860);

} else {
  /* ❌ 不正解 */
  btn.classList.add('ng');
  SND.ng();
  showToast('おしい！');
  setTimeout(() => all[q.a].classList.add('hint'), 360);
  setTimeout(() => {
    btn.classList.remove('ng');
    all[q.a].classList.remove('hint');
    all.forEach(b => b.style.pointerEvents = '');
  }, 1050);
}
```

}

/* ④ 出発演出 */
function onDepart() {
const next = ST[qi + 1];
$(‘dNext’).textContent = ’つぎは　’ + next.n;
// 出発シーンの空を現在駅に合わせる
$(‘dSky’).style.background = ST[QS[qi].si].sky;

```
// 電車走行アニメ：transform:translateX を JS で制御（leftより確実）
const train = $('dTrain');
train.style.transition = 'none';
train.style.transform   = 'translateX(-140%)';  // 画面外左から
// 1フレーム待ってアニメ開始
requestAnimationFrame(() => requestAnimationFrame(() => {
  train.style.transition = 'transform 1.7s cubic-bezier(.28,.08,.42,1)';
  train.style.transform  = 'translateX(140%)';  // 画面外右へ
}));

mode === 'romance' ? SND.romance() : SND.depart();
sparkle(mode === 'romance' ? 36 : 20, mode === 'romance');

// 2.2秒後に⑤へ
setTimeout(() => { onArrive(); go('pg-arrive'); }, 2200);
```

}

/* ⑤ 到着 */
function onArrive() {
qi++;
const st = ST[qi];
$(‘aEmoji’).textContent = st.e;
$(‘aName’).textContent  = st.n;
const isLast = qi >= QS.length;
$(‘aSub’).textContent   = isLast ? ‘🎉 ゴールだよ！’ : ‘つぎの もんだいへ…’;
applyScene(qi);

```
// 自動遷移（ボタンなし）
setTimeout(() => {
  if (isLast) { onGoal(); go('pg-goal'); }
  else        { renderQ(); go('pg-question'); }
}, isLast ? 2600 : 2300);
```

}

/* ⑥ ゴール */
function onGoal() {
$(‘gBig’).textContent = mode === ‘romance’ ? ‘🌟’ : ‘🎉’;
const wrap = $(‘gStamps’);
wrap.innerHTML = ‘’;
ST.forEach(s => {
wrap.innerHTML += `<div class="g-stamp"> <div class="g-box">${s.e}</div> <div class="g-sname">${s.n.length>4?s.n.slice(0,4):s.n}</div> </div>`;
});
SND.goal();
sparkle(mode === ‘romance’ ? 44 : 28, mode === ‘romance’);
fireworks();
}

function fireworks() {
const fw = $(‘gFW’); fw.innerHTML = ‘’;
const cols = [’#ff4040’,’#40ff80’,’#4080ff’,’#ffe000’,’#ff40e0’,’#40e8d8’,’#ffd700’];
const iv = setInterval(() => {
const el = document.createElement(‘div’); el.className = ‘fw’;
const sz = 12 + Math.random() * 30;
el.style.cssText = `width:${sz}px;height:${sz}px; left:${Math.random()*100}%;top:${Math.random()*75}%; background:${cols[Math.floor(Math.random()*cols.length)]}; animation-duration:${1+Math.random()*.8}s; animation-delay:${Math.random()*.4}s;`;
fw.appendChild(el);
el.addEventListener(‘animationend’, () => el.remove());
}, 230);
setTimeout(() => clearInterval(iv), 5800);
}

function onRetry() {
$(‘root’).classList.remove(‘is-romance’);
go(‘pg-start’);
}

return { onStart, onMode, onRetry };
})();

function showToast(msg) {
const el = document.createElement(‘div’);
el.className = ‘toast’; el.textContent = msg;
document.body.appendChild(el);
setTimeout(() => el.remove(), 920);
}

/* ===================================================
BOOT（body末尾のscriptなのでDOMは確定済み・直接実行）
=================================================== */
// ボタンイベント
$(‘btnStart’).addEventListener(‘click’, () => Game.onStart());
$(‘btnK’).addEventListener(‘click’,     () => Game.onMode(‘kaisoku’));
$(‘btnR’).addEventListener(‘click’,     () => Game.onMode(‘romance’));
$(‘btnRetry’).addEventListener(‘click’, () => Game.onRetry());

// 星
(function initStars() {
const wrap = $(‘stars’);
for (let i = 0; i < 38; i++) {
const s = document.createElement(‘div’); s.className = ‘star’;
const sz = Math.random() * 3 + 1;
s.style.cssText = `width:${sz}px;height:${sz}px; top:${Math.random()*92}%;left:${Math.random()*100}%; animation-delay:${Math.random()*2.2}s;animation-duration:${1.4+Math.random()*2}s;`;
wrap.appendChild(s);
}
})();

// スタート画面の電車
$(‘sTrain’).innerHTML = mkTrain(false, 4);

// スクロール防止
document.addEventListener(‘touchmove’, e => e.preventDefault(), {passive: false});

// PWA SW（失敗してもゲームに影響しない）
try {
if (‘serviceWorker’ in navigator) {
const sw = `const V='v5'; self.addEventListener('install', () => self.skipWaiting()); self.addEventListener('activate', e => e.waitUntil( caches.keys().then(ks => Promise.all(ks.filter(k => k !== V).map(k => caches.delete(k)))) )); self.addEventListener('fetch', e => e.respondWith( caches.match(e.request).then(r => r || fetch(e.request)) ));`;
const blob = new Blob([sw], {type: ‘application/javascript’});
navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
} catch (_) {}
</script>

</body>
</html>
