<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>おだきゅう たんけん！ v7</title>
  <meta name="theme-color" content="#1f5fbf" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg1:#eef6ff; --bg2:#fffaf1; --panel:#ffffffee; --text:#17324d; --accent:#1f5fbf; --accent2:#ff9f1c;
      --ok:#18a957; --warn:#f59e0b; --danger:#ef4444;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2)); color:var(--text); min-height:100vh;
    }
    .app { max-width: 760px; margin: 0 auto; padding: 14px 14px 36px; }
    .card { background: var(--panel); border-radius: 24px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    .hidden { display:none !important; }
    h1,h2,h3,p { margin:0; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
    .title { font-size: 30px; font-weight: 900; letter-spacing: .02em; }
    .tiny { font-size: 13px; opacity:.8; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:999px; background:#fff; font-size:14px; font-weight:700; box-shadow: 0 4px 14px rgba(0,0,0,.06); }
    .route { display:flex; gap:8px; overflow-x:auto; padding:6px 0 2px; }
    .stop { min-width:110px; background:#fff; border:2px solid #dfe9f8; border-radius:18px; padding:10px; text-align:center; position:relative; }
    .stop.current { border-color:var(--accent); transform: translateY(-2px); }
    .stop.done { background:#eef9f0; border-color:#aee3bf; }
    .stop .jp { font-weight:900; font-size:15px; }
    .stop .land { font-size:22px; display:block; margin-bottom:4px; }
    .connector { align-self:center; font-size:22px; opacity:.45; }
    .hero { margin-top:12px; display:grid; grid-template-columns: 1.25fr .95fr; gap:12px; }
    .station-box { min-height: 250px; position:relative; overflow:hidden; }
    .station-badge { display:inline-block; background:rgba(255,255,255,.85); padding:6px 12px; border-radius:999px; font-size:14px; font-weight:800; margin-bottom:10px; }
    .station-name { font-size: 34px; font-weight: 900; margin-bottom:8px; }
    .station-desc { font-size: 18px; line-height:1.4; }
    .announcement { margin-top:12px; background: rgba(255,255,255,.65); border:2px solid rgba(31,95,191,.14); border-radius:18px; padding:12px; font-size:18px; line-height:1.45; font-weight:800; }
    .landmark { position:absolute; right:16px; bottom:12px; font-size:88px; opacity:.18; }
    .sparkles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .sparkles span {
      position:absolute; font-size:22px; animation: sparkle 1.6s ease forwards; opacity:0;
    }
    @keyframes sparkle {
      0% { transform: translateY(8px) scale(.6); opacity:0; }
      20% { opacity:1; }
      100% { transform: translateY(-36px) scale(1.15); opacity:0; }
    }
    .train-panel { display:flex; flex-direction:column; gap:12px; justify-content:space-between; }
    .train-track { position:relative; background:#f4f7fb; height:76px; border-radius:18px; overflow:hidden; border:2px solid #dfe9f8; }
    .rail { position:absolute; left:0; right:0; top:50%; height:8px; background: repeating-linear-gradient(90deg,#7d8da1 0 16px,#cfd8e3 16px 28px); transform: translateY(-50%); opacity:.55; }
    .train { position:absolute; top:18px; left:12px; font-size:40px; transition:left .6s ease; }
    .goal-flag { position:absolute; right:10px; top:8px; font-size:28px; }
    .meter { height:14px; background:#ecf1f9; border-radius:999px; overflow:hidden; }
    .meter > div { height:100%; width:0%; background: linear-gradient(90deg,#1f5fbf,#5ea6ff); transition: width .5s ease; }
    .stamps { display:flex; flex-wrap:wrap; gap:8px; }
    .stamp { width:46px; height:46px; border-radius:50%; background:#f7f8fb; display:flex; align-items:center; justify-content:center; border:2px dashed #c7d6ea; font-size:20px; }
    .stamp.on { background:#fff6da; border-style:solid; border-color:#ffd56a; }
    .quiz { margin-top:12px; }
    .quiz-head { display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:12px; }
    .question-type { font-weight:900; color:var(--accent); }
    .question-text { font-size: 28px; font-weight: 900; line-height:1.35; margin-bottom:14px; }
    .choices { display:grid; gap:12px; }
    button.choice, .bigbtn, .modebtn {
      appearance:none; border:none; border-radius:20px; padding:18px 16px; background:#fff; color:var(--text);
      font-size:24px; font-weight:900; box-shadow: 0 8px 20px rgba(0,0,0,.08); border:3px solid transparent;
    }
    button.choice:active, .bigbtn:active, .modebtn:active { transform: scale(.98); }
    button.choice.hint { border-color: var(--warn); }
    button.choice.correct { border-color: var(--ok); background:#eefbf2; }
    button.choice.wrong { border-color: var(--danger); background:#fff1f2; }
    .feedback { margin-top:12px; min-height:68px; display:flex; align-items:center; justify-content:center; text-align:center; font-size:24px; font-weight:900; }
    .feedback.ok { color:var(--ok); }
    .feedback.warn { color:#b45309; }
    .bottom { margin-top:12px; display:flex; gap:12px; }
    .bigbtn { flex:1; background: linear-gradient(180deg, #1f5fbf, #1b4f9f); color:#fff; }
    .subbtn { background:#fff; color:var(--accent); }
    .screen-center { min-height: calc(100vh - 50px); display:flex; flex-direction:column; justify-content:center; gap:18px; }
    .modes { display:grid; gap:12px; }
    .modebtn { text-align:left; }
    .modebtn strong { display:block; font-size:24px; }
    .modebtn span { display:block; font-size:15px; opacity:.8; margin-top:4px; font-weight:700; }
    .goal-screen { text-align:center; }
    .goal-emoji { font-size:88px; }
    .goal-title { font-size:34px; font-weight:900; margin:8px 0; }
    .mini { font-size:16px; opacity:.85; }
    .unlock { background:#fff7d1; border:2px solid #f4d56c; padding:10px 12px; border-radius:18px; margin-top:10px; font-weight:900; }
    .parent-note { margin-top:10px; font-size:12px; opacity:.72; text-align:center; }

    .depart-badge, .arrival-ribbon {
      position:absolute; left:50%; transform:translateX(-50%) scale(.7); top:8px;
      background:linear-gradient(180deg,#fff9cf,#ffe27a); color:#7a4d00; border:2px solid #ffd56a;
      border-radius:999px; padding:8px 16px; font-size:18px; font-weight:900; opacity:0; pointer-events:none;
      box-shadow:0 8px 20px rgba(255,213,106,.35);
    }
    .arrival-ribbon { top:auto; bottom:10px; background:linear-gradient(180deg,#e9f5ff,#beddff); color:#124173; border-color:#9fc8ff; }
    .show-badge { animation: badgePop .9s ease forwards; }
    @keyframes badgePop {
      0% { opacity:0; transform:translateX(-50%) scale(.7) translateY(10px); }
      20% { opacity:1; transform:translateX(-50%) scale(1.08) translateY(0); }
      80% { opacity:1; transform:translateX(-50%) scale(1); }
      100% { opacity:0; transform:translateX(-50%) scale(.94) translateY(-4px); }
    }
    .train.pop { animation: trainPop .75s ease; }
    .train.boost { animation: trainBoost .9s ease; }
    @keyframes trainPop {
      0% { transform:translateY(0) scale(1); }
      35% { transform:translateY(-8px) scale(1.15) rotate(-3deg); }
      100% { transform:translateY(0) scale(1); }
    }
    @keyframes trainBoost {
      0% { transform:translateX(0) scale(1); filter:drop-shadow(0 0 0 rgba(255,215,0,0)); }
      30% { transform:translateX(12px) scale(1.18); filter:drop-shadow(0 0 10px rgba(255,215,0,.9)); }
      70% { transform:translateX(-4px) scale(1.05); }
      100% { transform:translateX(0) scale(1); filter:drop-shadow(0 0 0 rgba(255,215,0,0)); }
    }
    .choice.shake { animation: shake .35s ease; }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25% { transform:translateX(-8px); }
      50% { transform:translateX(8px); }
      75% { transform:translateX(-5px); }
    }
    .feedback.pop { animation: feedbackPop .45s ease; }
    @keyframes feedbackPop {
      0% { transform:scale(.85); opacity:.4; }
      100% { transform:scale(1); opacity:1; }
    }
    .station-box.flash { animation: cardFlash .7s ease; }
    @keyframes cardFlash {
      0% { box-shadow:0 0 0 rgba(255,214,106,0); }
      40% { box-shadow:0 0 0 8px rgba(255,214,106,.28), 0 10px 30px rgba(0,0,0,.08); }
      100% { box-shadow:0 10px 30px rgba(0,0,0,.08); }
    }

    @media (max-width: 700px) {
      .hero { grid-template-columns: 1fr; }
      .station-name { font-size: 30px; }
      .question-text { font-size:26px; }
      button.choice { font-size:22px; }
      .announcement { font-size:17px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="startScreen" class="screen-center">
      <div class="topbar">
        <div>
          <div class="title">おだきゅう たんけん！</div>
          <div class="tiny">まちだから しんじゅくへ。えらんで、すすんで、スタンプをあつめよう！</div>
        </div>
        <div class="pill" id="bestBadge">⭐ さいこう 0こ</div>
      </div>
      <div class="card">
        <h2 style="font-size:28px; margin-bottom:12px;">れっしゃを えらぼう</h2>
        <div class="modes">
          <button class="modebtn" data-mode="rapid"><strong>🚆 かいそくきゅうこう</strong><span>ほんものっぽい ていしゃえきで しんじゅくへ！</span></button>
          <button class="modebtn" data-mode="romance"><strong>🚄 ろまんすかー</strong><span>きらきら ちゃいむつき。 とくべつな たび！</span></button>
          <button class="modebtn" data-mode="count"><strong>🔢 すうじ チャレンジ</strong><span>えきの かずを かぞえて たびを すすめよう！</span></button>
        </div>
        <div id="romanceLock" class="unlock hidden">🔓 しんじゅくに 1かい つくと、ろまんすかーが もっと たのしくなるよ！</div>
      </div>
      <div class="card">
        <h3 style="font-size:22px; margin-bottom:8px;">きょうの ルート</h3>
        <div class="route" id="previewRoute"></div>
      </div>
      <div class="parent-note">※ とくちょう：えんしゅつ つよめ / しゅっぱつアニメ / きらきら ろまんすかー ちゃいむ</div>
    </section>

    <section id="gameScreen" class="hidden">
      <div class="topbar">
        <div>
          <div class="title" id="appTitle">おだきゅう たんけん！</div>
          <div class="tiny" id="modeCaption"></div>
        </div>
        <div class="pill" id="stampCount">⭐ 0 / 6</div>
      </div>

      <div class="card">
        <div class="route" id="routeTrack"></div>
      </div>

      <div class="hero">
        <div class="card station-box" id="stationCard">
          <div class="station-badge" id="stationBadge">いまの えき</div>
          <div class="station-name" id="stationName"></div>
          <div class="station-desc" id="stationDesc"></div>
          <div class="announcement" id="announcementText"></div>
          <div class="landmark" id="landmark"></div>
          <div class="sparkles" id="sparkles"></div>
          <div class="depart-badge" id="departBadge">しゅっぱつ！</div>
          <div class="arrival-ribbon" id="arrivalRibbon">とうちゃく！</div>
        </div>
        <div class="card train-panel">
          <div>
            <div class="tiny" style="font-weight:800; margin-bottom:6px;">たびの しんちょく</div>
            <div class="train-track">
              <div class="rail"></div>
              <div class="goal-flag">🏁</div>
              <div class="train" id="trainEmoji">🚆</div>
            </div>
            <div class="meter" style="margin-top:10px;"><div id="meterFill"></div></div>
          </div>
          <div>
            <div class="tiny" style="font-weight:800; margin-bottom:6px;">スタンプ</div>
            <div class="stamps" id="stamps"></div>
          </div>
        </div>
      </div>

      <div class="card quiz">
        <div class="quiz-head">
          <div class="question-type" id="questionType">つぎの えき</div>
          <button id="speakBtn" class="subbtn" style="padding:10px 14px;border-radius:999px;border:none;font-weight:900;">🔊 よみあげ</button>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <div class="bottom">
          <button class="bigbtn hidden" id="nextBtn">つぎへ すすむ</button>
          <button class="bigbtn subbtn hidden" id="retryBtn">もういちど</button>
        </div>
      </div>
    </section>

    <section id="goalScreen" class="screen-center hidden">
      <div class="card goal-screen">
        <div class="goal-emoji" id="goalEmoji">🎉</div>
        <div class="goal-title" id="goalTitle">しんじゅく とうちゃく！</div>
        <p class="mini" id="goalText"></p>
        <div class="stamps" id="goalStamps" style="justify-content:center; margin:16px 0;"></div>
        <div id="unlockMessage" class="unlock hidden"></div>
        <div class="bottom">
          <button class="bigbtn" id="againBtn">もう 1かい あそぶ</button>
          <button class="bigbtn subbtn" id="homeBtn">タイトルへ</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STATIONS = [
      {
        key:'machida', name:'まちだ', icon:'🏬', color1:'#eaf4ff', color2:'#fff6e7',
        desc:'ここから しゅっぱつ！ かいそくきゅうこうで しんじゅくへ。',
        announcement:'まもなく まちだです。 ドアが しまりまーす。 しゅっぱつ しんこう！'
      },
      {
        key:'shin-yuri', name:'しんゆりがおか', icon:'🌳', color1:'#eefcf3', color2:'#f1fbff',
        desc:'たません のりかえの えき。 つぎは かわを わたるよ。',
        announcement:'まもなく しんゆりがおかです。 たませんは おのりかえです。'
      },
      {
        key:'noborito', name:'のぼりと', icon:'🌉', color1:'#eefaff', color2:'#f9fff1',
        desc:'かわの ちかくを すすむよ。 つぎは にぎやかな まちへ。',
        announcement:'まもなく のぼりとです。 みぎがわに かわが みえてくるよ。'
      },
      {
        key:'shimokita', name:'しもきたざわ', icon:'🎸', color1:'#fff2fb', color2:'#fff9ef',
        desc:'おしゃれな えき！ もう だいぶ ゴールに ちかい。',
        announcement:'まもなく しもきたざわです。 にぎやかな まちへ とうちゃく！'
      },
      {
        key:'yoyogi-uehara', name:'よよぎうえはら', icon:'🚇', color1:'#f2f6ff', color2:'#f5fff6',
        desc:'もうすぐ しんじゅく！ さいごの 1えきだよ。',
        announcement:'まもなく よよぎうえはらです。 つぎは いよいよ しんじゅく！'
      },
      {
        key:'shinjuku', name:'しんじゅく', icon:'🏙️', color1:'#fff4e8', color2:'#f0f7ff',
        desc:'ゴール！ たんけん せいこう！',
        announcement:'まもなく しんじゅく、 しんじゅくです。 ごーるに とうちゃく！'
      }
    ];

    const ROUTE_CHOICES = {
      machida: ['しんゆりがおか','たまがわがくえんまえ','さがみおおの'],
      'shin-yuri': ['のぼりと','よみうりらんどまえ','むこうがおかゆうえん'],
      noborito: ['しもきたざわ','いくた','せいじょうがくえんまえ'],
      shimokita: ['よよぎうえはら','ひがしきたざわ','しんじゅく'],
      'yoyogi-uehara': ['しんじゅく','ひがしきたざわ','よよぎはちまん']
    };

    const state = {
      mode: 'rapid',
      index: 0,
      stamps: [],
      question: null,
      wrongCount: 0,
      unlockedRomance: false,
      best: 0
    };

    const el = id => document.getElementById(id);
    const previewRoute = el('previewRoute');
    const routeTrack = el('routeTrack');
    const stampsEl = el('stamps');
    const goalStamps = el('goalStamps');
    const startScreen = el('startScreen');
    const gameScreen = el('gameScreen');
    const goalScreen = el('goalScreen');

    function loadProgress() {
      const saved = JSON.parse(localStorage.getItem('odakyu-v7-progress') || '{}');
      state.unlockedRomance = !!saved.unlockedRomance;
      state.best = saved.best || 0;
      el('bestBadge').textContent = `⭐ さいこう ${state.best}こ`;
      if (state.unlockedRomance) el('romanceLock').classList.remove('hidden');
    }

    function saveProgress() {
      localStorage.setItem('odakyu-v7-progress', JSON.stringify({ unlockedRomance: state.unlockedRomance, best: state.best }));
    }

    function shuffle(list) {
      const a = [...list];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function stationAt(i){ return STATIONS[i]; }

    function renderRoute(target) {
      target.innerHTML = '';
      STATIONS.forEach((st, i) => {
        const stop = document.createElement('div');
        stop.className = 'stop' + (i < state.index ? ' done' : '') + (i === state.index ? ' current' : '');
        stop.innerHTML = `<span class="land">${st.icon}</span><div class="jp">${st.name}</div>${i===state.index?'<div class="tiny">いまここ</div>':''}`;
        target.appendChild(stop);
        if (i < STATIONS.length - 1) {
          const c = document.createElement('div');
          c.className='connector';
          c.textContent='➜';
          target.appendChild(c);
        }
      });
    }

    function renderStamps(target, total = STATIONS.length) {
      target.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const s = document.createElement('div');
        s.className = 'stamp' + (state.stamps.includes(i) ? ' on' : '');
        s.textContent = state.stamps.includes(i) ? STATIONS[i].icon : '☆';
        target.appendChild(s);
      }
    }

    function currentQuestion() {
      const st = stationAt(state.index);
      if (state.index >= STATIONS.length - 1) return null;
      const next = stationAt(state.index + 1);
      const remainStops = STATIONS.length - 1 - state.index;

      const bank = [
        {
          type: 'つぎの えき',
          text: `${st.name}の つぎは どこ？`,
          correct: next.name,
          choices: shuffle(ROUTE_CHOICES[st.key])
        },
        {
          type: 'なんばんめ？',
          text: `${st.name}から 1ばん つぎに とまる えきは？`,
          correct: next.name,
          choices: shuffle([
            next.name,
            stationAt(Math.max(0,state.index-1)).name,
            stationAt(Math.min(STATIONS.length-1,state.index+2)).name
          ].filter((v, idx, arr)=>arr.indexOf(v)===idx))
        },
        {
          type: 'あと いくつ？',
          text: `しんじゅくまで あと いくつ とまる？`,
          correct: String(remainStops),
          choices: shuffle([String(remainStops), String(Math.max(1, remainStops-1)), String(remainStops+1)])
        }
      ];

      if (state.mode === 'count') {
        bank.push({
          type: 'すうじ チャレンジ',
          text: `${st.name}から ${next.name}へ すすむと えきは いくつ ふえる？`,
          correct: '1',
          choices: shuffle(['1','2','3'])
        });
      }

      if (state.mode === 'romance') {
        bank.push({
          type: 'ろまんすかー',
          text: `とくべつな れっしゃで ${next.name}へ いこう！ どれを おす？`,
          correct: next.name,
          choices: shuffle([next.name, 'まちがいじゃないけど いまは ちがう', 'あとで とまる えき'])
        });
      }

      return bank[(state.index + (state.mode==='count'?1:0) + (state.mode==='romance'?2:0)) % bank.length];
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = 0.93;
      u.pitch = state.mode === 'romance' ? 1.05 : 1.0;
      window.speechSynthesis.speak(u);
    }

    function toneSequence(notes, master=0.12) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      let t = ctx.currentTime;
      notes.forEach(([freq, dur, type='sine', gap=0.02, gain=master]) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t + dur);
        t += dur + gap;
      });
    }

    function beep(freq=880, duration=0.12, type='sine', gap=0.03, count=2, gainMax=0.14) {
      const notes = [];
      for (let i=0;i<count;i++) notes.push([freq * (1 + i*0.08), duration, type, gap, gainMax]);
      toneSequence(notes, gainMax);
    }

    function correctFanfare() {
      toneSequence([
        [784, 0.08, 'triangle', 0.01, 0.10],
        [1046, 0.09, 'triangle', 0.01, 0.12],
        [1319, 0.12, 'triangle', 0.03, 0.14],
        [1568, 0.18, 'sine', 0.01, 0.15]
      ], 0.14);
    }

    function wrongBuzz() {
      toneSequence([
        [320,0.07,'square',0.02,0.06],
        [260,0.08,'square',0.01,0.05]
      ], 0.06);
    }

    function romanceChime() {
      toneSequence([
        [1046, 0.12, 'triangle', 0.02, 0.10],
        [1319, 0.12, 'sine', 0.02, 0.11],
        [1568, 0.14, 'triangle', 0.02, 0.12],
        [2093, 0.16, 'sine', 0.02, 0.12],
        [1760, 0.12, 'triangle', 0.02, 0.11],
        [2093, 0.18, 'sine', 0.03, 0.13],
        [2637, 0.26, 'triangle', 0.02, 0.14]
      ], 0.13);
      setTimeout(() => sparkleBurst(18), 40);
    }

    function sparkleBurst(count=10) {
      const host = el('sparkles');
      host.innerHTML = '';
      const symbols = ['✨','⭐','💫','✴️'];
      for (let i=0; i<count; i++) {
        const s = document.createElement('span');
        s.textContent = symbols[i % symbols.length];
        s.style.left = (8 + Math.random()*84) + '%';
        s.style.top = (40 + Math.random()*40) + '%';
        s.style.animationDelay = (Math.random()*0.24) + 's';
        host.appendChild(s);
      }
      setTimeout(() => { host.innerHTML = ''; }, 1800);
    }


    function flashBadge(id, text) {
      const node = el(id);
      node.textContent = text;
      node.classList.remove('show-badge');
      void node.offsetWidth;
      node.classList.add('show-badge');
    }

    function animateTrainAdvance() {
      const nextPercent = ((state.index + 1) / (STATIONS.length - 1)) * 100;
      const train = el('trainEmoji');
      train.classList.remove('pop','boost');
      void train.offsetWidth;
      train.style.left = `calc(${nextPercent}% - 8px)`;
      train.classList.add('boost');
      setTimeout(() => train.classList.remove('boost'), 950);
    }

    function celebrateCorrect(nextName) {
      flashBadge('departBadge', `しゅっぱつ！ ${nextName}へ`);
      el('stationCard').classList.remove('flash');
      void el('stationCard').offsetWidth;
      el('stationCard').classList.add('flash');
      sparkleBurst(state.mode === 'romance' ? 24 : 16);
      animateTrainAdvance();
      setTimeout(() => el('stationCard').classList.remove('flash'), 760);
    }

    function arrivalEffect(st) {
      el('announcementText').textContent = st.announcement;
      flashBadge('arrivalRibbon', `とうちゃく！ ${st.name}`);
      const train = el('trainEmoji');
      train.classList.remove('pop');
      void train.offsetWidth;
      train.classList.add('pop');
      if (state.mode === 'romance') {
        romanceChime();
      } else {
        beep(698, 0.09, 'triangle', 0.02, 2, 0.12);
      }
      speak(st.announcement);
      setTimeout(() => train.classList.remove('pop'), 760);
    }

    function setStationTheme(st) {
      document.body.style.background = `linear-gradient(180deg, ${st.color1}, ${st.color2})`;
      el('stationName').textContent = st.name;
      el('stationDesc').textContent = st.desc;
      el('announcementText').textContent = st.announcement;
      el('landmark').textContent = st.icon;
      el('stationCard').style.background = 'rgba(255,255,255,.92)';
      el('stationBadge').textContent = state.index === STATIONS.length - 1 ? 'ゴール！' : 'とうちゃく アナウンス';
    }

    function updateTrain() {
      const percent = (state.index / (STATIONS.length - 1)) * 100;
      el('meterFill').style.width = percent + '%';
      el('trainEmoji').style.left = `calc(${percent}% - 8px)`;
      el('trainEmoji').textContent = state.mode === 'romance' ? '🚄' : '🚆';
      el('stampCount').textContent = `⭐ ${state.stamps.length} / ${STATIONS.length}`;
    }

    function renderQuestion(playArrival=true) {
      const st = stationAt(state.index);
      setStationTheme(st);
      renderRoute(routeTrack);
      if (!state.stamps.includes(state.index)) state.stamps.push(state.index);
      renderStamps(stampsEl);
      updateTrain();
      if (playArrival) arrivalEffect(st);

      state.question = currentQuestion();
      state.wrongCount = 0;
      el('feedback').className = 'feedback';
      el('feedback').textContent = '';
      el('nextBtn').classList.add('hidden');
      el('retryBtn').classList.add('hidden');

      if (!state.question) return finishGame();

      el('questionType').textContent = state.question.type;
      el('questionText').textContent = state.question.text;
      const choices = el('choices');
      choices.innerHTML = '';
      state.question.choices.forEach(choice => {
        const b = document.createElement('button');
        b.className = 'choice';
        b.textContent = choice;
        b.onclick = () => selectChoice(choice, b);
        choices.appendChild(b);
      });
    }

    function selectChoice(choice, btn) {
      const correct = choice === state.question.correct;
      const all = [...document.querySelectorAll('.choice')];
      if (correct) {
        all.forEach(b => b.disabled = true);
        btn.classList.add('correct');
        const next = stationAt(state.index + 1);
        el('feedback').className = 'feedback ok pop';
        el('feedback').textContent = `やった！ ${next.name}へ しゅっぱつ！`;
        if (state.mode === 'romance') {
          romanceChime();
        } else {
          correctFanfare();
        }
        celebrateCorrect(next.name);
        speak(`せいかい！ ${next.name}へ しゅっぱつ！`);
        el('nextBtn').classList.remove('hidden');
      } else {
        btn.classList.add('wrong','shake');
        state.wrongCount += 1;
        wrongBuzz();
        setTimeout(() => btn.classList.remove('shake'), 420);
        if (state.wrongCount === 1) {
          el('feedback').className = 'feedback warn pop';
          el('feedback').textContent = 'おしい！ もういちど えらぼう';
          const hintBtn = all.find(b => b.textContent === state.question.correct);
          if (hintBtn) hintBtn.classList.add('hint');
          el('retryBtn').classList.remove('hidden');
        } else {
          all.forEach(b => b.disabled = true);
          const right = all.find(b => b.textContent === state.question.correct);
          if (right) right.classList.add('correct');
          el('feedback').className = 'feedback warn pop';
          el('feedback').textContent = `こたえは 「${state.question.correct}」！ つぎは いけるよ！`;
          sparkleBurst(8);
          el('nextBtn').classList.remove('hidden');
        }
      }
    }

    function nextStep() {
      state.index += 1;
      if (state.index >= STATIONS.length - 1) return finishGame();
      renderQuestion(true);
    }

    function finishGame() {
      const finalSt = stationAt(STATIONS.length - 1);
      setStationTheme(finalSt);
      if (!state.stamps.includes(STATIONS.length - 1)) state.stamps.push(STATIONS.length - 1);
      gameScreen.classList.add('hidden');
      goalScreen.classList.remove('hidden');
      const total = state.stamps.length;
      state.best = Math.max(state.best, total);
      if (!state.unlockedRomance) state.unlockedRomance = true;
      saveProgress();
      el('bestBadge').textContent = `⭐ さいこう ${state.best}こ`;
      el('goalEmoji').textContent = state.mode === 'romance' ? '🚄' : '🎉';
      el('goalTitle').textContent = 'しんじゅく とうちゃく！';
      el('goalText').textContent = state.mode === 'count'
        ? 'すうじも でんしゃも ばっちり！ つぎは ろまんすかーも ためしてみよう。'
        : 'スタンプを あつめて ゴール！ とうちゃく アナウンスも ばっちりだったね。';
      renderStamps(goalStamps);
      const unlock = el('unlockMessage');
      unlock.classList.remove('hidden');
      unlock.textContent = '🔓 ろまんすかー モードも たのしんでね！';
      romanceChime();
      speak(finalSt.announcement);
    }

    function startGame(mode) {
      state.mode = mode;
      state.index = 0;
      state.stamps = [];
      startScreen.classList.add('hidden');
      goalScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      el('appTitle').textContent = mode === 'count' ? 'おだきゅう すうじたんけん！' : mode === 'romance' ? 'ろまんすかー たんけん！' : 'おだきゅう たんけん！';
      el('modeCaption').textContent = mode === 'count' ? 'えきの かずを かぞえながら しんじゅくへ' : mode === 'romance' ? 'とくべつな れっしゃで きらきら しゅっぱつ！' : 'かいそくきゅうこうで しんじゅくへ';
      renderQuestion(true);
    }

    function goHome() {
      goalScreen.classList.add('hidden');
      gameScreen.classList.add('hidden');
      startScreen.classList.remove('hidden');
      renderRoute(previewRoute);
      renderStamps(goalStamps);
      if (state.unlockedRomance) el('romanceLock').classList.remove('hidden');
    }

    document.querySelectorAll('.modebtn').forEach(btn => btn.addEventListener('click', () => startGame(btn.dataset.mode)));
    el('nextBtn').addEventListener('click', nextStep);
    el('retryBtn').addEventListener('click', () => {
      el('retryBtn').classList.add('hidden');
      el('feedback').textContent = 'よく みて えらんでみよう！';
    });
    el('againBtn').addEventListener('click', () => startGame(state.mode));
    el('homeBtn').addEventListener('click', goHome);
    el('speakBtn').addEventListener('click', () => {
      const st = stationAt(state.index);
      speak(`${st.announcement} ${el('questionText').textContent}`);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
    }

    loadProgress();
    renderRoute(previewRoute);
    renderStamps(goalStamps);
  </script>
</body>
</html>
