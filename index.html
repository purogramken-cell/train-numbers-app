<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="おだきゅうのたび">
<meta name="theme-color" content="#003087">
<title>おだきゅう でんしゃのたび</title>
<style>
/* =====================================================
   BASE
===================================================== */
:root {
  --blue:  #003087;
  --blue2: #0057b8;
  --green: #10b981;
  --red:   #ef4444;
  --gold:  #ffd700;
  --dark:  #1a1a2e;
  --gray:  #6b7280;
  --st: env(safe-area-inset-top,    0px);
  --sb: env(safe-area-inset-bottom, 20px);
}

*, *::before, *::after {
box-sizing: border-box; margin: 0; padding: 0;
-webkit-tap-highlight-color: transparent;
-webkit-touch-callout: none; user-select: none;
}

html, body {
width: 100%; height: 100%; overflow: hidden; background: #000;
font-family: ‘Hiragino Maru Gothic ProN’,‘Hiragino Kaku Gothic ProN’,
‘BIZ UDPGothic’, sans-serif;
}

body { display: flex; justify-content: center; }

#root {
width: 100%; max-width: 430px; height: 100dvh;
position: relative; overflow: hidden;
}

/* =====================================================
SCREEN BASE  ―― display:none で完全に存在を消す
===================================================== */
.scr {
position: absolute; inset: 0;
display: none;           /* ← 非表示時は完全非表示 */
flex-direction: column;
align-items: center;
animation: scrIn .32s ease both;
}
.scr.on { display: flex; }

@keyframes scrIn {
from { opacity: 0; transform: translateY(14px) scale(.97); }
to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* =====================================================
① START
===================================================== */
#pg-start {
background: linear-gradient(170deg, #000e30 0%, #003087 55%, #0057b8 100%);
justify-content: space-between;
padding-top:    calc(var(–st) + 32px);
padding-bottom: calc(var(–sb) + 40px);
}

/* 星 */
.stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.star  {
position: absolute; border-radius: 50%; background: #fff;
animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
from { opacity: .15; transform: scale(1);   }
to   { opacity: 1;   transform: scale(1.6); }
}

/* タイトル */
.start-title {
text-align: center; z-index: 1; padding: 0 32px;
}
.start-badge {
display: inline-block;
border: 1.5px solid rgba(255,255,255,.3);
border-radius: 100px; padding: 7px 24px;
color: rgba(255,255,255,.8);
font-size: 11px; font-weight: 700; letter-spacing: 4px;
margin-bottom: 24px;
}
.start-h1 {
color: #fff; font-size: 38px; font-weight: 900;
line-height: 1.2; text-shadow: 0 4px 32px rgba(0,0,0,.45);
}
.start-h1 small {
display: block; font-size: 16px; font-weight: 600;
opacity: .7; letter-spacing: 2px; margin-top: 10px;
}

/* 電車シーン */
.start-scene {
width: 100%; height: 170px; position: relative;
overflow: hidden; flex-shrink: 0; z-index: 1;
}
.s-ground { position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
background: linear-gradient(#5cb85c, #4a9e30); }
.s-rail   { position: absolute; bottom: 32px; left: 0; right: 0; height: 9px; background: #7a6a5a; }
.s-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg,
rgba(255,255,255,.32) 0 14px, transparent 14px 28px);
}
.s-train {
position: absolute; bottom: 41px; left: 50%; transform: translateX(-50%);
display: flex; gap: 2px;
animation: trainBob 2.6s ease-in-out infinite;
}
@keyframes trainBob {
0%,100% { transform: translateX(-50%) translateY(0);  }
50%     { transform: translateX(-50%) translateY(-7px);}
}

/* はじめるボタン */
.start-foot { width: 100%; padding: 0 28px; z-index: 1; }
.btn-start {
width: 100%; padding: 26px;
background: #fff; color: var(–blue);
border: none; border-radius: 28px;
font-size: 28px; font-weight: 900; letter-spacing: 2px;
box-shadow: 0 14px 50px rgba(0,0,0,.4);
cursor: pointer;
}
.btn-start:active { transform: scale(.95); }

/* =====================================================
② MODE SELECT
===================================================== */
#pg-mode {
background: #eef2fa;
padding-top:    calc(var(–st) + 44px);
padding-bottom: calc(var(–sb) + 28px);
gap: 32px;
}

.mode-ttl { font-size: 30px; font-weight: 900; color: var(–blue); text-align: center; }
.mode-ttl small { display: block; font-size: 15px; color: var(–gray); font-weight: 600; margin-top: 8px; }

.mode-list {
display: flex; flex-direction: column; gap: 20px;
width: 100%; padding: 0 24px; flex: 1; justify-content: center;
}

.mode-btn {
border: none; border-radius: 28px; padding: 36px 30px;
cursor: pointer; text-align: left; position: relative; overflow: hidden;
}
.mode-btn:active { transform: scale(.95); }

.mode-btn.blue {
background: linear-gradient(135deg, #003087, #0057b8);
box-shadow: 0 14px 48px rgba(0,48,135,.4);
}
.mode-btn.purple {
background: linear-gradient(135deg, #2d0057, #6b0080 50%, #8b0000);
box-shadow: 0 14px 48px rgba(45,0,87,.5);
}

.mode-name { color: #fff; font-size: 36px; font-weight: 900; }
.mode-desc { color: rgba(255,255,255,.7); font-size: 15px; font-weight: 600; margin-top: 8px; line-height: 1.5; }
.mode-icon { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); font-size: 72px; opacity: .2; }

.mode-btn.purple .mode-name { color: var(–gold); }

/* =====================================================
③ QUESTION
===================================================== */
#pg-question {
/* 背景はJSで差し込む */
background: #eef2fa;
}

/* 上：ミニ電車シーン（高さ固定） */
.q-scene {
width: 100%; height: 200px; flex-shrink: 0;
position: relative; overflow: hidden;
transition: background .6s;
}
.q-sky    { position: absolute; inset: 0; transition: background 1s; }
.q-sun    {
position: absolute; top: 20px; right: 30px;
width: 48px; height: 48px; border-radius: 50%;
background: radial-gradient(circle, #ffd700, #ffa500);
box-shadow: 0 0 32px rgba(255,215,0,.6);
transition: opacity .8s;
}
.q-cloud { position: absolute; background: #fff; border-radius: 50px; opacity: .85; }
.q-cloud::before,.q-cloud::after { content:’’; position:absolute; background:#fff; border-radius:50%; }
.qc1 { width:72px;height:25px;top:22px; animation:cm 24s linear infinite; }
.qc1::before{width:38px;height:38px;top:-18px;left:8px;}
.qc1::after {width:28px;height:28px;top:-14px;left:34px;}
.qc2 { width:52px;height:19px;top:52px;opacity:.6; animation:cm 33s linear infinite 8s; }
.qc2::before{width:28px;height:28px;top:-14px;left:6px;}
@keyframes cm { from{transform:translateX(-120px);} to{transform:translateX(560px);} }

.q-blds {
position:absolute; bottom:54px; left:0; right:0; height:72px;
display:flex; align-items:flex-end; gap:2px; padding:0 8px;
transition: opacity .8s;
}
.q-bld { border-radius:3px 3px 0 0; flex-shrink:0; }
.q-gnd { position:absolute; bottom:0; left:0; right:0; height:54px; transition:background .8s; }
.q-rail { position:absolute; bottom:20px; left:0; right:0; height:9px; background:#7a6a5a; }
.q-rail::before {
content:’’; position:absolute; inset:2px 0;
background: repeating-linear-gradient(90deg,
rgba(255,255,255,.32) 0 14px, transparent 14px 28px);
}
.q-train {
position: absolute; bottom: 29px; left: 50%;
transform: translateX(-50%);
display: flex; gap: 2px; z-index: 10;
}

/* 中：いま */
.q-now {
width: 100%; padding: 12px 22px 10px;
background: #fff;
display: flex; align-items: center; gap: 10px;
border-bottom: 2px solid #dde8f8;
flex-shrink: 0;
}
.q-dot {
width: 11px; height: 11px; border-radius: 50%;
background: var(–blue); flex-shrink: 0;
animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.q-now-label { font-size: 14px; color: var(–gray); font-weight: 700; }
.q-now-name  { font-size: 22px; font-weight: 900; color: var(–blue); }

/* 下：問題＋ボタン */
.q-body {
flex: 1; width: 100%;
display: flex; flex-direction: column;
padding: 16px 16px calc(var(–sb) + 14px);
gap: 12px; overflow: hidden;
background: #eef2fa;
}

.q-qcard {
background: #fff; border-radius: 22px;
padding: 20px 22px; flex-shrink: 0;
box-shadow: 0 4px 20px rgba(0,48,135,.09);
}
.q-qlabel { font-size: 12px; color: var(–blue); font-weight: 800; opacity: .6; margin-bottom: 8px; }
.q-qtext  { font-size: 28px; font-weight: 900; color: var(–dark); line-height: 1.3; }

.q-choices { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }

/* 選択肢ボタン */
.cbtn {
width: 100%; min-height: 86px;
background: #fff; border: 3px solid #d8e6f8; border-radius: 22px;
font-size: 23px; font-weight: 900; color: var(–dark);
cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 14px;
box-shadow: 0 8px 0 #b8cce0;
transition: transform .08s, box-shadow .08s;
-webkit-tap-highlight-color: transparent;
}
.cbtn:active { transform: translateY(7px); box-shadow: 0 1px 0 #b8cce0; }

.cbtn.ok {
background: #d0f5e8; border-color: var(–green); color: #064e35;
box-shadow: 0 8px 0 #60c898, 0 0 0 5px rgba(16,185,129,.2);
animation: btnOk .4s ease forwards;
}
@keyframes btnOk {
0%  { transform: scale(1)    translateY(0);  }
30% { transform: scale(1.08) translateY(-6px); }
60% { transform: scale(1.03) translateY(0);  }
100%{ transform: scale(1.03) translateY(0);  }
}

.cbtn.ng {
background: #fef0f0; border-color: #ffaaaa; color: #991b1b;
box-shadow: 0 8px 0 #ffaaaa;
animation: btnNg .38s ease;
}
@keyframes btnNg {
0%,100%{ transform: translateX(0); }
20%    { transform: translateX(-12px); }
40%    { transform: translateX(12px); }
60%    { transform: translateX(-7px); }
80%    { transform: translateX(7px); }
}
.cbtn.hint { background: #f0faf5; border-color: #a0d8bc; }

/* ロマンスカー：ボタン色 */
.is-romance .cbtn { border-color: rgba(201,162,39,.35); box-shadow: 0 8px 0 #7a5c00; }
.is-romance .cbtn.ok {
background: #fff8d0; border-color: var(–gold); color: #4a3200;
box-shadow: 0 8px 0 #c9a227, 0 0 0 5px rgba(201,162,39,.25);
}

.c-icon { font-size: 26px; flex-shrink: 0; }
.c-text { flex: 1; text-align: center; }

/* =====================================================
④ DEPARTURE（しゅっぱつ！！）
===================================================== */
#pg-depart {
background: linear-gradient(160deg, #000e30 0%, #003087 55%, #0057b8 100%);
justify-content: center;
}
.is-romance #pg-depart {
background: linear-gradient(160deg, #180028 0%, #3d0060 55%, #8b0000 100%) !important;
}

/* 電車が走り抜けるシーン */
.d-scene {
width: 100%; height: 200px; position: relative; overflow: hidden; flex-shrink: 0;
}
.d-gnd  { position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(#3a7a28,#2a6a18); }
.d-rail { position:absolute;bottom:34px;left:0;right:0;height:9px;background:#7a6a5a; }
.d-rail::before {
content:’’;position:absolute;inset:2px 0;
background:repeating-linear-gradient(90deg,rgba(255,255,255,.32) 0 14px,transparent 14px 28px);
}
.d-train {
position: absolute; bottom: 43px; left: -30%;
display: flex; gap: 2px;
animation: dRun 1.6s cubic-bezier(.25,0,.5,1) .2s both;
}
@keyframes dRun {
from { left: -30%; }
to   { left: 110%; }
}

/* 「しゅっぱつ！！」 */
.d-word {
font-size: 76px; font-weight: 900; color: #fff;
letter-spacing: 3px; text-align: center; z-index: 1;
text-shadow: 0 4px 36px rgba(0,0,0,.4);
animation: wordPop .48s cubic-bezier(.34,1.56,.64,1) .1s both;
line-height: 1;
}
@keyframes wordPop {
from { transform: scale(.1); opacity: 0; }
to   { transform: scale(1);  opacity: 1; }
}
.is-romance .d-word { color: var(–gold); text-shadow: 0 0 48px rgba(255,215,0,.75); }

.d-next {
font-size: 20px; font-weight: 700;
color: rgba(255,255,255,.75); letter-spacing: 2px;
margin-top: 16px; z-index: 1;
animation: fadeUp .4s ease .4s both;
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

/* =====================================================
⑤ ARRIVAL（とうちゃく！）
===================================================== */
#pg-arrive {
background: linear-gradient(160deg, #000e30 0%, #003087 100%);
justify-content: center;
}

.a-emoji {
font-size: 100px; line-height: 1;
animation: stampIn .5s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes stampIn {
from { transform: scale(0) rotate(-24deg); opacity: 0; }
to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.a-reached { font-size:15px; color:rgba(255,255,255,.6); font-weight:700; letter-spacing:3px; margin-top:24px; animation:fadeUp .4s .4s both; }
.a-name    { font-size:50px; font-weight:900; color:#fff; margin-top:8px; animation:fadeUp .4s .55s both; text-shadow:0 4px 24px rgba(0,0,0,.3); }
.a-sub     { font-size:16px; color:rgba(255,255,255,.65); font-weight:600; margin-top:8px; animation:fadeUp .4s .7s both; }

/* =====================================================
⑥ GOAL
===================================================== */
#pg-goal {
background: linear-gradient(160deg, #000e30 0%, #003087 55%, #0057b8 100%);
justify-content: space-between;
padding-top:    calc(var(–st) + 32px);
padding-bottom: calc(var(–sb) + 40px);
}
.is-romance #pg-goal {
background: linear-gradient(160deg, #180028 0%, #3d0060 55%, #8b0000 100%) !important;
}

/* 花火 */
.g-fw { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.fw { position:absolute; border-radius:50%; animation:fwB 1.5s ease-out infinite; }
@keyframes fwB { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(6);opacity:0;} }

.g-top { text-align:center; z-index:1; padding:0 28px; }
.g-big {
font-size:90px; display:block;
animation: gBounce .7s cubic-bezier(.34,1.56,.64,1) .2s both;
}
@keyframes gBounce {
from { transform: scale(0) rotate(-22deg); }
to   { transform: scale(1) rotate(0); }
}
.g-ttl { font-size:56px; font-weight:900; color:#fff; margin-top:14px; animation:fadeUp .5s .6s both; text-shadow:0 4px 24px rgba(0,0,0,.3); }
.g-sub { font-size:18px; color:rgba(255,255,255,.7); font-weight:600; margin-top:8px; animation:fadeUp .5s .75s both; }

/* スタンプ */
.g-stamps { display:flex; gap:10px; justify-content:center; z-index:1; animation:fadeUp .5s .9s both; flex-wrap:wrap; padding:0 20px; }
.g-stamp  { display:flex; flex-direction:column; align-items:center; gap:4px; }
.g-box    {
width:56px; height:56px; border-radius:14px;
background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.25);
display:flex; align-items:center; justify-content:center; font-size:28px;
}
.g-sname  { font-size:8px; color:rgba(255,255,255,.55); font-weight:700; text-align:center; }

/* もう一度ボタン */
.g-foot { width:100%; padding:0 28px; z-index:1; animation:fadeUp .5s 1.1s both; }
.btn-retry {
width:100%; padding:26px;
background:#fff; color:var(–blue);
border:none; border-radius:28px;
font-size:26px; font-weight:900; letter-spacing:2px;
box-shadow:0 14px 50px rgba(0,0,0,.38);
cursor:pointer;
}
.btn-retry:active { transform:scale(.95); }

/* =====================================================
SHARED: TRAIN PARTS
===================================================== */
.tc   { position:relative; display:flex; flex-direction:column; flex-shrink:0; }
.tb   { position:relative; border-radius:6px 6px 3px 3px; }
.tw-r { position:absolute; top:7px; left:4px; right:4px; display:flex; gap:3px; }
.tw   { flex:1; height:11px; border-radius:2px; border:1px solid rgba(255,255,255,.35); }
.tst  { position:absolute; bottom:10px; left:0; right:0; height:5px; }
.tws  { display:flex; justify-content:space-around; padding:0 4px; margin-top:1px; }
.tw2  { width:10px; height:10px; background:#555; border-radius:50%; border:2px solid #888; }
.tnose { position:absolute; left:-11px; top:4px; width:13px; height:28px; border-radius:10px 0 0 5px; border-right:none; }

/* かいそく */
.k .tb    { background:linear-gradient(180deg,#f0f0f0,#e0e0e0); border:1px solid #ccc; }
.k .tst   { background:#003087; }
.k .tw    { background:rgba(135,206,235,.85); }
.k .tnose { background:linear-gradient(180deg,#f0f0f0,#ddd); border:1px solid #ccc; }
/* ロマンスカー */
.r .tb    { background:linear-gradient(180deg,#c0392b,#922b21); border:1px solid #7b241c; }
.r .tst   { background:var(–gold); }
.r .tw    { background:rgba(255,200,100,.48); }
.r .tnose { background:linear-gradient(180deg,#c0392b,#922b21); border:1px solid #7b241c; }

/* =====================================================
SPARKLES
===================================================== */
#sp {
position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden;
}
.sp {
position:absolute; pointer-events:none;
animation: spFly 1.1s ease-out forwards;
}
@keyframes spFly {
0%  { transform:scale(0) rotate(0deg);    opacity:1; }
50% { transform:scale(1.8) rotate(180deg); opacity:1; }
100%{ transform:scale(0) rotate(360deg) translateY(-80px); opacity:0; }
}

/* 不正解トースト */
.toast {
position:fixed; top:48%; left:50%; transform:translate(-50%,-50%);
background:var(–red); color:#fff;
font-size:36px; font-weight:900; padding:16px 44px; border-radius:22px;
z-index:10000; pointer-events:none;
box-shadow:0 12px 48px rgba(239,68,68,.5);
animation:toastIn .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes toastIn {
from{ transform:translate(-50%,-50%) scale(.3); opacity:0; }
to  { transform:translate(-50%,-50%) scale(1);  opacity:1; }
}
</style>

</head>
<body>
<div id="root">

  <!-- ① スタート -->

  <div id="pg-start" class="scr on">
    <div class="stars" id="stars"></div>
    <div class="start-title">
      <div class="start-badge">おだきゅうせん</div>
      <h1 class="start-h1">おだきゅう<br>でんしゃのたび<small>まちだ → しんじゅく</small></h1>
    </div>
    <div class="start-scene">
      <div class="s-ground"></div>
      <div class="s-rail"></div>
      <div class="s-train" id="sTrain"></div>
    </div>
    <div class="start-foot">
      <button class="btn-start" id="btnStart">🚃 はじめる</button>
    </div>
  </div>

  <!-- ② モード選択 -->

  <div id="pg-mode" class="scr">
    <div class="mode-ttl">でんしゃを えらんでね<small>どっちに のる？</small></div>
    <div class="mode-list">
      <button class="mode-btn blue"   id="btnKaisoku">
        <div class="mode-name">かいそく</div>
        <div class="mode-desc">ふつうの でんしゃ<br>みんなで のれるよ</div>
        <div class="mode-icon">🚃</div>
      </button>
      <button class="mode-btn purple" id="btnRomance">
        <div class="mode-name">ロマンスカー</div>
        <div class="mode-desc">とくべつな でんしゃ<br>✨ キラキラ だよ ✨</div>
        <div class="mode-icon">🌟</div>
      </button>
    </div>
  </div>

  <!-- ③ 問題 -->

  <div id="pg-question" class="scr">
    <div class="q-scene">
      <div class="q-sky"  id="qSky"></div>
      <div class="q-sun"  id="qSun"></div>
      <div class="q-cloud qc1"></div>
      <div class="q-cloud qc2"></div>
      <div class="q-blds" id="qBlds"></div>
      <div class="q-gnd"  id="qGnd"></div>
      <div class="q-rail"></div>
      <div class="q-train" id="qTrain"></div>
    </div>
    <div class="q-now">
      <div class="q-dot"></div>
      <span class="q-now-label">いま：</span>
      <span class="q-now-name" id="qNow"></span>
    </div>
    <div class="q-body">
      <div class="q-qcard">
        <div class="q-qlabel">つぎの えきは？</div>
        <div class="q-qtext" id="qText"></div>
      </div>
      <div class="q-choices" id="qChoices"></div>
    </div>
  </div>

  <!-- ④ 出発 -->

  <div id="pg-depart" class="scr">
    <div class="d-scene">
      <div class="d-gnd"></div>
      <div class="d-rail"></div>
      <div class="d-train" id="dTrain"></div>
    </div>
    <div class="d-word">しゅっぱつ！！</div>
    <div class="d-next" id="dNext">つぎは しんゆりがおか</div>
  </div>

  <!-- ⑤ 到着 -->

  <div id="pg-arrive" class="scr">
    <div class="a-emoji"   id="aEmoji">🌸</div>
    <div class="a-reached">とうちゃく！</div>
    <div class="a-name"    id="aName">しんゆりがおか</div>
    <div class="a-sub"     id="aSub">つぎの もんだいへ…</div>
  </div>

  <!-- ⑥ ゴール -->

  <div id="pg-goal" class="scr">
    <div class="g-fw" id="gFW"></div>
    <div class="g-top">
      <span class="g-big" id="gBig">🎉</span>
      <div class="g-ttl">ゴール！</div>
      <div class="g-sub" id="gSub">しんじゅく に とうちゃく！</div>
    </div>
    <div class="g-stamps" id="gStamps"></div>
    <div class="g-foot">
      <button class="btn-retry" id="btnRetry">🔄 もういちど！</button>
    </div>
  </div>

  <div id="sp"></div>
</div>

<script>
/* =====================================================
   DATA
===================================================== */
const ST = [
  {n:'まちだ',        e:'🏙️', sky:'linear-gradient(180deg,#87ceeb,#b8d9f8 70%,#d4eaff)', gnd:'linear-gradient(#7ec850,#5a9e3d)', b:false},
  {n:'しんゆりがおか',e:'🌸', sky:'linear-gradient(180deg,#98d8f0,#c5e8f8 70%,#e0f0ff)', gnd:'linear-gradient(#6ab84a,#4a9e30)', b:true },
  {n:'のぼりと',      e:'🌊', sky:'linear-gradient(180deg,#b8d9f8,#d4eaff 70%,#eaf4ff)', gnd:'linear-gradient(#5da842,#3d8e28)', b:true },
  {n:'しもきたざわ',  e:'🎵', sky:'linear-gradient(180deg,#c5d8f0,#d8e8f8 70%,#eaf2ff)', gnd:'linear-gradient(#a0a0b0,#808090)', b:true },
  {n:'よよぎうえはら',e:'🌆', sky:'linear-gradient(180deg,#e8d5c0,#f0e0c8 70%,#fff0e0)', gnd:'linear-gradient(#888898,#686878)', b:true },
  {n:'しんじゅく',    e:'🌟', sky:'linear-gradient(180deg,#1a1a3a,#2a2a5a 70%,#3a3a7a)', gnd:'linear-gradient(#606070,#404050)', b:true },
];

const QS = [
  {si:0, q:'まちだの　つぎは　どこ？',        a:0, cs:['しんゆりがおか','たまがわがくえんまえ','さがみおおの']},
  {si:1, q:'しんゆりがおかの　つぎは　どこ？', a:0, cs:['のぼりと','よみうりランドまえ','むこうがおかゆえん']},
  {si:2, q:'のぼりとの　つぎは　どこ？',       a:2, cs:['きたみ','せいじょうがくえんまえ','しもきたざわ']},
  {si:3, q:'しもきたざわの　つぎは　どこ？',   a:1, cs:['だいたばし','よよぎうえはら','さんぐうばし']},
  {si:4, q:'よよぎうえはらの　つぎは　どこ？', a:0, cs:['しんじゅく','はらじゅく','よよぎ']},
];

/* =====================================================
   AUDIO
===================================================== */
let _ac;
const ac = () => { if(!_ac) _ac = new(window.AudioContext||window.webkitAudioContext)(); return _ac; };

function tone(f,t,d,v=.27,tp='sine'){
  try{
    const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=f; o.type=tp;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v, t+.04);
    g.gain.exponentialRampToValueAtTime(.001, t+d);
    o.start(t); o.stop(t+d);
  }catch(_){}
}

const SND = {
  ok:      ()=>{ const t=ac().currentTime; [880,1100,1320,1760].forEach((f,i)=>tone(f,t+i*.12,.32)); },
  ng:      ()=>{ tone(260,ac().currentTime,.3,.2,'sawtooth'); },
  depart:  ()=>{ const t=ac().currentTime; [523,659,784,1047,784,659,523].forEach((f,i)=>tone(f,t+i*.14,.44)); },
  romance: ()=>{ const t=ac().currentTime; [523,659,784,1047,1319,1047,784,523].forEach((f,i)=>tone(f,t+i*.17,.64,.2)); },
  goal:    ()=>{
    const t=ac().currentTime;
    [{f:523,d:.15},{f:523,d:.15},{f:523,d:.15},{f:659,d:.5},
     {f:784,d:.15},{f:784,d:.15},{f:784,d:.15},{f:1047,d:.9}]
     .reduce((s,{f,d})=>{ tone(f,t+s,.38,.28,'triangle'); return s+d; },0);
  },
};

/* =====================================================
   TRAIN HTML BUILDER
===================================================== */
function buildTrain(isR, n=4){
  const c = isR ? 'r' : 'k';
  return Array.from({length:n}, (_,i) => {
    const head = i===0, w = head?64:56, h=38;
    return `<div class="tc ${c}">
      <div class="tb" style="width:${w}px;height:${h}px">
        ${head?`<div class="tnose ${c}"></div>`:''}
        <div class="tw-r"><div class="tw"></div><div class="tw"></div>${!head?'<div class="tw"></div>':''}</div>
        <div class="tst"></div>
      </div>
      <div class="tws"><div class="tw2"></div><div class="tw2"></div></div>
    </div>`;
  }).join('');
}

/* =====================================================
   SPARKLES
===================================================== */
function sparkle(n=18, isR=false){
  const layer = document.getElementById('sp');
  const ems = isR ? ['✨','⭐','🌟','💫','👑','💎','🎊'] : ['✨','⭐','🌟','💫','🎉','🎊'];
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    el.className = 'sp';
    el.textContent = ems[Math.floor(Math.random()*ems.length)];
    el.style.cssText = `
      left:${6+Math.random()*88}%;
      top:${10+Math.random()*80}%;
      font-size:${18+Math.random()*32}px;
      animation-delay:${Math.random()*.55}s;
      animation-duration:${.9+Math.random()*.9}s;
    `;
    layer.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}

/* =====================================================
   SCENE
===================================================== */
function applyScene(idx){
  const s = ST[idx];
  Q('qSky').style.background = s.sky;
  Q('qGnd').style.background = s.gnd;
  Q('qSun').style.opacity = idx>=5 ? '0' : '1';
  const blds = Q('qBlds');
  blds.innerHTML = '';
  if(s.b){
    const Hs=[38,60,42,68,46,58,34,72,50,42,65,38];
    const Ws=[26,20,30,17,28,22,24,19,32,20,26,22];
    Hs.forEach((h,i)=>{
      const d=document.createElement('div'); d.className='q-bld';
      d.style.cssText=`width:${Ws[i]}px;height:${h}px;background:${['#c8d8e8','#b8cce0','#d8e4f0'][i%3]}`;
      blds.appendChild(d);
    });
    blds.style.opacity='1';
  } else {
    blds.style.opacity='0';
  }
}

/* =====================================================
   SCREEN SWITCHER  ―― 切り替え時に display:none で完全消去
===================================================== */
const PAGES = ['pg-start','pg-mode','pg-question','pg-depart','pg-arrive','pg-goal'];

function go(id){
  PAGES.forEach(p => {
    const el = document.getElementById(p);
    el.classList.remove('on');
    // アニメ完了後に確実に display:none にする
    el.style.display = 'none';
  });
  const target = document.getElementById(id);
  target.style.display = '';   // CSS の display:flex を復活
  // 次フレームでクラス付与してアニメ発火
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ target.classList.add('on'); });
  });
}

const Q = id => document.getElementById(id);

/* =====================================================
   GAME STATE MACHINE
===================================================== */
const Game = (()=>{
  let mode = 'kaisoku';
  let qi   = 0;
  let lock = false;   // 多重タップ防止

  /* モード適用 */
  function setMode(m){
    mode = m;
    const root = document.getElementById('root');
    m==='romance' ? root.classList.add('is-romance') : root.classList.remove('is-romance');
  }

  /* 状態① → ② */
  function onStart(){
    go('pg-mode');
  }

  /* 状態② → ③ */
  function onMode(m){
    setMode(m);
    qi = 0; lock = false;
    const isR = m==='romance';
    // 電車を全箇所に描画
    Q('sTrain').innerHTML = buildTrain(isR,4);
    Q('qTrain').innerHTML = buildTrain(isR,4);
    Q('dTrain').innerHTML = buildTrain(isR,4);
    applyScene(0);
    showQuestion();
    go('pg-question');
  }

  /* 問題セット */
  function showQuestion(){
    const q = QS[qi];
    Q('qNow').textContent  = ST[q.si].n;
    Q('qText').textContent = q.q;
    const icons = ['🚉','🚊','🚋'];
    Q('qChoices').innerHTML = '';
    q.cs.forEach((c,i)=>{
      const btn = document.createElement('button');
      btn.className = 'cbtn';
      btn.innerHTML = `<span class="c-icon">${icons[i]}</span><span class="c-text">${c}</span>`;
      btn.addEventListener('click', ()=>onAnswer(i, btn));
      Q('qChoices').appendChild(btn);
    });
    lock = false;
  }

  /* 状態③ 回答 */
  function onAnswer(idx, btn){
    if(lock) return;
    const q = QS[qi];
    const all = document.querySelectorAll('.cbtn');
    all.forEach(b=>b.style.pointerEvents='none');

    if(idx === q.a){
      /* ✅ 正解 → ④へ */
      lock = true;
      btn.classList.add('ok');
      SND.ok();
      sparkle(24, mode==='romance');

      setTimeout(()=>{
        showDepart();
        go('pg-depart');
      }, 820);

    } else {
      /* ❌ 不正解 → 同画面でリトライ */
      btn.classList.add('ng');
      SND.ng();
      showToast('おしい！');

      // 正解をそっとヒント
      setTimeout(()=>all[q.a].classList.add('hint'), 340);

      setTimeout(()=>{
        btn.classList.remove('ng');
        all[q.a].classList.remove('hint');
        all.forEach(b=>b.style.pointerEvents='');
      }, 1000);
    }
  }

  /* 状態④ 出発演出 */
  function showDepart(){
    const next = ST[qi+1];
    Q('dNext').textContent = 'つぎは　' + next.n;
    mode==='romance' ? SND.romance() : SND.depart();
    sparkle(mode==='romance'?32:18, mode==='romance');

    // 1.9秒後に⑤へ自動遷移
    setTimeout(()=>{
      showArrive();
      go('pg-arrive');
    }, 1900);
  }

  /* 状態⑤ 到着 */
  function showArrive(){
    qi++;   // 次の駅へ進める
    const st = ST[qi];
    Q('aEmoji').textContent = st.e;
    Q('aName').textContent  = st.n;

    const isLast = qi >= QS.length;
    Q('aSub').textContent = isLast ? 'ゴールだよ！🎉' : 'つぎの もんだいへ…';

    applyScene(qi);

    // 2.2秒後に自動遷移（ボタンなし）
    const delay = isLast ? 2500 : 2200;
    setTimeout(()=>{
      if(isLast){
        showGoal();
        go('pg-goal');
      } else {
        showQuestion();
        go('pg-question');
      }
    }, delay);
  }

  /* 状態⑥ ゴール */
  function showGoal(){
    Q('gBig').textContent = mode==='romance' ? '🌟' : '🎉';
    Q('gSub').textContent = 'しんじゅく に とうちゃく！';

    const wrap = Q('gStamps');
    wrap.innerHTML = '';
    ST.forEach(s=>{
      wrap.innerHTML += `
        <div class="g-stamp">
          <div class="g-box">${s.e}</div>
          <div class="g-sname">${s.n.length>4?s.n.slice(0,4):s.n}</div>
        </div>`;
    });

    SND.goal();
    sparkle(mode==='romance'?40:26, mode==='romance');
    fireworks();
  }

  /* ゴール花火 */
  function fireworks(){
    const fw = Q('gFW');
    fw.innerHTML = '';
    const cols = ['#ff4444','#44ff88','#4488ff','#ffee00','#ff44ee','#44ffee','#ffd700'];
    const iv = setInterval(()=>{
      const el=document.createElement('div'); el.className='fw';
      const sz=14+Math.random()*28;
      el.style.cssText=`width:${sz}px;height:${sz}px;
        left:${Math.random()*100}%;top:${Math.random()*72}%;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        animation-duration:${1+Math.random()*.7}s;
        animation-delay:${Math.random()*.4}s;`;
      fw.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    }, 240);
    setTimeout(()=>clearInterval(iv), 5500);
  }

  /* リスタート */
  function onRetry(){
    document.getElementById('root').classList.remove('is-romance');
    go('pg-start');
  }

  return { onStart, onMode, onRetry };
})();

/* =====================================================
   EVENT BINDING
===================================================== */
document.getElementById('btnStart').addEventListener('click',   ()=>Game.onStart());
document.getElementById('btnKaisoku').addEventListener('click', ()=>Game.onMode('kaisoku'));
document.getElementById('btnRomance').addEventListener('click', ()=>Game.onMode('romance'));
document.getElementById('btnRetry').addEventListener('click',   ()=>Game.onRetry());

/* トースト */
function showToast(msg){
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

/* =====================================================
   INIT
===================================================== */
(()=>{
  // 星
  const wrap = document.getElementById('stars');
  for(let i=0;i<36;i++){
    const s = document.createElement('div'); s.className='star';
    const sz = Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;
      top:${Math.random()*90}%;left:${Math.random()*100}%;
      animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s;`;
    wrap.appendChild(s);
  }

  // スタート画面の電車
  document.getElementById('sTrain').innerHTML = buildTrain(false, 4);

  // スクロール防止
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

  // PWA Service Worker（インライン）
  if('serviceWorker' in navigator){
    const sw = `const V='v4';
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k))))
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request))
));`;
    const blob = new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
})();
</script>

</body>
</html>
