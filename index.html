<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="odakyu">
<meta name="theme-color" content="#003087">
<title>おだきゅう でんしゃのたび</title>
<style>
:root {
  --blue: #003087;
  --green: #0ea572;
  --red: #e53e3e;
  --gold: #f5c842;
  --dark: #1a1a2e;
  --gray: #64748b;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 20px);
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none; user-select: none;
}
html, body {
  width: 100%; height: 100%; overflow: hidden; background: #000;
  font-family: 'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN','BIZ UDPGothic',sans-serif;
}
body { display: flex; justify-content: center; }
#root { width: 100%; max-width: 430px; height: 100dvh; position: relative; overflow: hidden; }

/* SCREEN */
.scr { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; }
.scr.on { display: flex; animation: scrPop 0.34s ease both; }
@keyframes scrPop {
from { opacity: 0; transform: scale(0.94) translateY(16px); }
to   { opacity: 1; transform: scale(1)    translateY(0); }
}

/* ===================== START ===================== */
#pg-start {
background: linear-gradient(175deg, #000c28 0%, #002878 50%, #0048b8 100%);
justify-content: space-between;
padding-top: calc(var(–st) + 28px);
padding-bottom: calc(var(–sb) + 36px);
}
.stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 2s infinite alternate; }
@keyframes twinkle {
from { opacity: 0.1; transform: scale(1); }
to   { opacity: 1;   transform: scale(1.7); }
}
.s-head { text-align: center; z-index: 1; padding: 0 28px; }
.s-badge {
display: inline-block;
border: 1.5px solid rgba(255,255,255,0.35); border-radius: 100px;
padding: 7px 24px; color: rgba(255,255,255,0.8);
font-size: 11px; font-weight: 700; letter-spacing: 4px; margin-bottom: 20px;
}
.s-title { color: #fff; font-size: 38px; font-weight: 900; line-height: 1.2; text-shadow: 0 4px 32px rgba(0,0,0,0.5); }
.s-title small { display: block; font-size: 16px; font-weight: 600; opacity: 0.7; letter-spacing: 2px; margin-top: 10px; }
.s-scene { width: 100%; height: 180px; position: relative; overflow: hidden; flex-shrink: 0; z-index: 1; }
.s-sky  { position: absolute; inset: 0; background: linear-gradient(#6ab8e8, #a8d8f0); }
.s-gnd  { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background: linear-gradient(#5cb85c, #4a9e30); }
.s-rail { position: absolute; bottom: 36px; left: 0; right: 0; height: 9px; background: #7a6a5a; }
.s-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg, rgba(255,255,255,0.35) 0 14px, transparent 14px 28px);
}
.s-train {
position: absolute; bottom: 45px; left: 50%;
transform: translateX(-50%); display: flex; gap: 2px;
animation: tBob 2.4s ease-in-out infinite;
}
@keyframes tBob {
0%,100% { transform: translateX(-50%) translateY(0); }
50%     { transform: translateX(-50%) translateY(-8px); }
}
.s-foot { width: 100%; padding: 0 24px; z-index: 1; }
.btn-start {
width: 100%; padding: 26px;
background: #fff; color: var(–blue);
border: none; border-radius: 28px;
font-size: 28px; font-weight: 900; letter-spacing: 2px;
box-shadow: 0 10px 0 #c8d8f0, 0 14px 40px rgba(0,0,0,0.4);
cursor: pointer;
}
.btn-start:active { transform: translateY(8px); box-shadow: 0 2px 0 #c8d8f0; }

/* ===================== MODE ===================== */
#pg-mode {
background: #eef2fb;
padding-top: calc(var(–st) + 40px);
padding-bottom: calc(var(–sb) + 28px);
gap: 28px;
}
.m-head { font-size: 28px; font-weight: 900; color: var(–blue); text-align: center; }
.m-head small { display: block; font-size: 15px; color: var(–gray); font-weight: 600; margin-top: 8px; }
.m-list { display: flex; flex-direction: column; gap: 18px; width: 100%; padding: 0 22px; flex: 1; justify-content: center; }
.m-btn { border: none; border-radius: 28px; padding: 34px 28px; cursor: pointer; text-align: left; position: relative; overflow: hidden; }
.m-btn.blue   { background: linear-gradient(140deg, #002878 0%, #005ad8 100%); box-shadow: 0 12px 0 #001860, 0 18px 48px rgba(0,40,120,0.4); }
.m-btn.purple { background: linear-gradient(140deg, #280040 0%, #7a0080 50%, #900020 100%); box-shadow: 0 12px 0 #180028, 0 18px 48px rgba(40,0,64,0.5); }
.m-btn.blue:active   { transform: translateY(10px); box-shadow: 0 2px 0 #001860; }
.m-btn.purple:active { transform: translateY(10px); box-shadow: 0 2px 0 #180028; }
.m-name { color: #fff; font-size: 34px; font-weight: 900; }
.m-desc { color: rgba(255,255,255,0.72); font-size: 14px; font-weight: 600; margin-top: 8px; line-height: 1.55; }
.m-icon { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); font-size: 72px; opacity: 0.22; }
.m-btn.purple .m-name { color: var(–gold); }
.m-btn.purple::after {
content: ‘\2728’;
position: absolute; font-size: 20px; top: 12px; left: 14px;
animation: mStar 1.4s ease-in-out infinite alternate;
}
@keyframes mStar { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

/* ===================== QUESTION ===================== */
#pg-question { background: #eef2fb; }
.q-scene { width: 100%; height: 192px; position: relative; overflow: hidden; flex-shrink: 0; }
.q-sky { position: absolute; inset: 0; }
.q-sun {
position: absolute; top: 18px; right: 28px;
width: 46px; height: 46px; border-radius: 50%;
background: radial-gradient(circle, #ffe040, #ff9800);
box-shadow: 0 0 30px rgba(255,200,0,0.7); transition: opacity 0.8s;
}
.q-cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.88; }
.q-cloud::before, .q-cloud::after { content: ‘’; position: absolute; background: #fff; border-radius: 50%; }
.qc1 { width: 72px; height: 24px; top: 20px; animation: cloudMove 26s linear infinite; }
.qc1::before { width: 38px; height: 38px; top: -18px; left: 8px; }
.qc1::after  { width: 28px; height: 28px; top: -14px; left: 34px; }
.qc2 { width: 50px; height: 18px; top: 50px; opacity: 0.6; animation: cloudMove 35s linear infinite 9s; }
.qc2::before { width: 26px; height: 26px; top: -14px; left: 6px; }
@keyframes cloudMove { from { transform: translateX(-130px); } to { transform: translateX(570px); } }
.q-blds { position: absolute; bottom: 52px; left: 0; right: 0; height: 72px; display: flex; align-items: flex-end; gap: 2px; padding: 0 8px; }
.q-bld  { border-radius: 3px 3px 0 0; flex-shrink: 0; }
.q-gnd  { position: absolute; bottom: 0; left: 0; right: 0; height: 52px; }
.q-rail { position: absolute; bottom: 20px; left: 0; right: 0; height: 9px; background: #7a6a5a; }
.q-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg, rgba(255,255,255,0.35) 0 14px, transparent 14px 28px);
}
.q-train {
position: absolute; bottom: 29px; left: 50%;
transform: translateX(-50%); display: flex; gap: 2px; z-index: 10;
animation: qBob 2.2s ease-in-out infinite;
}
@keyframes qBob {
0%,100% { transform: translateX(-50%) translateY(0); }
50%     { transform: translateX(-50%) translateY(-5px); }
}
.q-now { width: 100%; padding: 12px 22px 10px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #dde8f8; flex-shrink: 0; }
.q-dot { width: 11px; height: 11px; border-radius: 50%; background: var(–blue); flex-shrink: 0; animation: dotPulse 1.8s ease-in-out infinite; }
@keyframes dotPulse {
0%  { box-shadow: 0 0 0 0   rgba(0,48,135,0.5); }
60% { box-shadow: 0 0 0 8px rgba(0,48,135,0); }
100%{ box-shadow: 0 0 0 0   rgba(0,48,135,0); }
}
.q-now-lbl { font-size: 14px; color: var(–gray); font-weight: 700; }
.q-now-nm  { font-size: 22px; font-weight: 900; color: var(–blue); }
.q-body { flex: 1; width: 100%; display: flex; flex-direction: column; padding: 14px 14px calc(var(–sb) + 12px); gap: 12px; overflow: hidden; }
.q-card { background: #fff; border-radius: 22px; padding: 18px 20px; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,48,135,0.09); }
.q-clabel { font-size: 11px; color: var(–blue); font-weight: 800; opacity: 0.55; margin-bottom: 6px; letter-spacing: 1px; }
.q-ctext  { font-size: 26px; font-weight: 900; color: var(–dark); line-height: 1.35; }
.q-choices { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }

/* ===================== CHOICE BUTTONS ===================== */
.cbtn {
width: 100%; min-height: 88px;
background: #fff; border: 3px solid #ccddf8; border-radius: 24px;
font-size: 24px; font-weight: 900; color: var(–dark);
cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 14px;
box-shadow: 0 9px 0 #a8c0e0, 0 12px 24px rgba(0,48,135,0.15);
-webkit-tap-highlight-color: transparent;
}
.cbtn:active { transform: translateY(8px); box-shadow: 0 1px 0 #a8c0e0; }
.cbtn.ok {
background: #c8f5e0; border-color: #0ea572; color: #064e35;
box-shadow: 0 9px 0 #068050, 0 0 0 5px rgba(14,165,114,0.22);
animation: btnOk 0.42s ease forwards;
}
@keyframes btnOk {
0%   { transform: scale(1)    translateY(0); }
35%  { transform: scale(1.1)  translateY(-8px); }
65%  { transform: scale(1.04) translateY(0); }
100% { transform: scale(1.04) translateY(0); }
}
.cbtn.ng {
background: #fde8e8; border-color: #f0a0a0; color: #922;
box-shadow: 0 9px 0 #f0a0a0; animation: btnNg 0.4s ease;
}
@keyframes btnNg {
0%,100% { transform: translateX(0); }
18%     { transform: translateX(-13px); }
36%     { transform: translateX(13px); }
54%     { transform: translateX(-8px); }
72%     { transform: translateX(8px); }
}
.cbtn.hint { background: #edfaf4; border-color: #80d4aa; }
.is-romance .cbtn { border-color: rgba(201,162,39,0.5); box-shadow: 0 9px 0 #8a6800, 0 12px 24px rgba(140,100,0,0.2); }
.is-romance .cbtn:active { transform: translateY(8px); box-shadow: 0 1px 0 #8a6800; }
.is-romance .cbtn.ok { background: #fff3c4; border-color: var(–gold); color: #4a3200; box-shadow: 0 9px 0 #b08000, 0 0 0 5px rgba(245,200,66,0.3); }
.c-icon { font-size: 26px; flex-shrink: 0; }
.c-text { flex: 1; text-align: center; line-height: 1.2; }

/* ===================== DEPARTURE ===================== */
#pg-depart {
background: linear-gradient(170deg, #000c28 0%, #002878 55%, #0050b8 100%);
justify-content: center; gap: 0;
}
.is-romance #pg-depart { background: linear-gradient(170deg, #1a0030 0%, #4a0078 45%, #900020 100%) !important; }
.d-scene { width: 100%; height: 210px; position: relative; overflow: hidden; flex-shrink: 0; }
.d-sky  { position: absolute; inset: 0; }
.d-gnd  { position: absolute; bottom: 0; left: 0; right: 0; height: 52px; background: linear-gradient(#3a7828, #2a6018); }
.d-rail { position: absolute; bottom: 36px; left: 0; right: 0; height: 9px; background: #7a6a5a; }
.d-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg, rgba(255,255,255,0.35) 0 14px, transparent 14px 28px);
}
.d-train { position: absolute; bottom: 45px; display: flex; gap: 2px; z-index: 10; will-change: transform; }
.d-shuppatsu {
font-size: 80px; font-weight: 900; color: #fff;
letter-spacing: 2px; text-align: center; z-index: 1; line-height: 1;
text-shadow: 0 4px 40px rgba(0,0,0,0.4);
animation: shupPop 0.52s ease 0.08s both; margin-top: 12px;
}
@keyframes shupPop {
from { transform: scale(0.08); opacity: 0; }
to   { transform: scale(1);    opacity: 1; }
}
.is-romance .d-shuppatsu { color: var(–gold); text-shadow: 0 0 60px rgba(245,200,66,0.9); }
.d-next { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.78); letter-spacing: 1px; margin-top: 18px; z-index: 1; animation: fadeUp 0.38s ease 0.38s both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

/* ===================== ARRIVAL ===================== */
#pg-arrive {
background: linear-gradient(170deg, #000c28 0%, #002878 100%);
justify-content: center;
}
.is-romance #pg-arrive { background: linear-gradient(170deg, #1a0030 0%, #4a0078 100%) !important; }
.a-emoji { font-size: 108px; line-height: 1; animation: stampIn 0.52s ease 0.1s both; }
@keyframes stampIn { from { transform: scale(0) rotate(-28deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
.a-label { font-size: 15px; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 3px; margin-top: 28px; animation: fadeUp 0.38s ease 0.4s both; }
.a-name  { font-size: 52px; font-weight: 900; color: #fff; margin-top: 8px; animation: fadeUp 0.38s ease 0.55s both; text-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.a-sub   { font-size: 16px; color: rgba(255,255,255,0.65); font-weight: 600; margin-top: 8px; animation: fadeUp 0.38s ease 0.7s both; }

/* ===================== GOAL ===================== */
#pg-goal {
background: linear-gradient(170deg, #000c28 0%, #002878 52%, #0050b8 100%);
justify-content: space-between;
padding-top: calc(var(–st) + 24px);
padding-bottom: calc(var(–sb) + 32px);
}
.is-romance #pg-goal { background: linear-gradient(170deg, #1a0030 0%, #4a0078 48%, #900020 100%) !important; }
.g-fw { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.fw   { position: absolute; border-radius: 50%; animation: fwB 1.6s ease-out infinite; }
@keyframes fwB { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(7); opacity: 0; } }
.g-top { text-align: center; z-index: 1; padding: 0 20px; width: 100%; }

/* ゴール画面もころん */
.g-moko-wrap {
position: relative; display: inline-block; margin-bottom: 8px;
}
.g-moko-img {
width: 140px; height: 140px; object-fit: contain;
animation: gBounce 0.72s cubic-bezier(0.34,1.56,0.64,1) 0.18s both;
display: block; margin: 0 auto;
}
@keyframes gBounce { from { transform: scale(0) rotate(-24deg); } to { transform: scale(1) rotate(0); } }
.g-moko-say {
display: inline-block;
background: #fff; color: var(–blue);
font-size: 20px; font-weight: 900;
padding: 8px 22px; border-radius: 100px;
box-shadow: 0 4px 20px rgba(0,0,0,0.2);
animation: fadeUp 0.48s ease 0.7s both;
margin-top: 8px;
}
.is-romance .g-moko-say { background: var(–gold); color: #3a2000; }
.g-ttl { font-size: 48px; font-weight: 900; color: #fff; margin-top: 10px; animation: fadeUp 0.48s ease 0.9s both; text-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.g-sub { font-size: 17px; color: rgba(255,255,255,0.72); font-weight: 600; margin-top: 6px; animation: fadeUp 0.48s ease 1.05s both; }
.g-stamps { display: flex; gap: 8px; justify-content: center; z-index: 1; animation: fadeUp 0.48s ease 1.2s both; flex-wrap: wrap; padding: 0 16px; }
.g-stamp  { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.g-box    { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.26); display: flex; align-items: center; justify-content: center; font-size: 24px; }
.g-sname  { font-size: 7px; color: rgba(255,255,255,0.55); font-weight: 700; text-align: center; }
.g-foot   { width: 100%; padding: 0 24px; z-index: 1; animation: fadeUp 0.48s ease 1.35s both; }
.btn-retry {
width: 100%; padding: 24px;
background: #fff; color: var(–blue);
border: none; border-radius: 28px;
font-size: 24px; font-weight: 900; letter-spacing: 2px;
box-shadow: 0 10px 0 #c8d8f0, 0 14px 40px rgba(0,0,0,0.4);
cursor: pointer;
}
.btn-retry:active { transform: translateY(8px); box-shadow: 0 2px 0 #c8d8f0; }

/* ===================== TRAIN ===================== */
.tc    { position: relative; display: flex; flex-direction: column; flex-shrink: 0; }
.tb    { position: relative; border-radius: 6px 6px 3px 3px; }
.tw-r  { position: absolute; top: 7px; left: 4px; right: 4px; display: flex; gap: 3px; }
.tw    { flex: 1; height: 11px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.4); }
.tst   { position: absolute; bottom: 10px; left: 0; right: 0; height: 5px; }
.tws   { display: flex; justify-content: space-around; padding: 0 4px; margin-top: 1px; }
.tw2   { width: 10px; height: 10px; background: #555; border-radius: 50%; border: 2px solid #888; }
.tnose { position: absolute; left: -11px; top: 4px; width: 13px; height: 28px; border-radius: 10px 0 0 5px; border-right: none; }
.k .tb    { background: linear-gradient(180deg, #f2f2f2, #e0e0e0); border: 1px solid #ccc; }
.k .tst   { background: #003087; }
.k .tw    { background: rgba(140,210,240,0.88); }
.k .tnose { background: linear-gradient(180deg, #f2f2f2, #ddd); border: 1px solid #ccc; }
.r .tb    { background: linear-gradient(180deg, #d43030, #8a1818); border: 1px solid #701010; }
.r .tst   { background: linear-gradient(90deg, #d4a800, #f5c842, #d4a800); }
.r .tw    { background: rgba(255,210,100,0.55); }
.r .tnose { background: linear-gradient(180deg, #d43030, #8a1818); border: 1px solid #701010; }

/* ===================== SPARKLES ===================== */
#sp { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
.sp { position: absolute; pointer-events: none; animation: spFly 1.15s ease-out forwards; }
@keyframes spFly {
0%   { transform: scale(0) rotate(0deg);    opacity: 1; }
48%  { transform: scale(1.9) rotate(185deg); opacity: 1; }
100% { transform: scale(0) rotate(370deg) translateY(-90px); opacity: 0; }
}

/* ===================== TOAST ===================== */
.toast {
position: fixed; top: 46%; left: 50%;
transform: translate(-50%, -50%);
background: var(–red); color: #fff;
font-size: 38px; font-weight: 900; padding: 18px 48px; border-radius: 24px;
z-index: 10000; pointer-events: none;
box-shadow: 0 12px 50px rgba(200,50,50,0.55);
animation: toastIn 0.28s ease;
}
@keyframes toastIn {
from { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
}

/* ===================== もころんポップアップ（正解時） ===================== */
#moko-popup {
position: fixed;
bottom: -260px;
left: 50%;
transform: translateX(-50%);
z-index: 8000;
pointer-events: none;
transition: bottom 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
text-align: center;
}
#moko-popup.show {
bottom: calc(var(–sb) + 10px);
}
.moko-say-bubble {
display: inline-block;
background: #fff;
color: var(–blue);
font-size: 22px;
font-weight: 900;
padding: 8px 22px;
border-radius: 100px;
white-space: nowrap;
box-shadow: 0 4px 16px rgba(0,0,0,0.2);
margin-bottom: 8px;
animation: bubblePop 0.3s ease 0.25s both;
}
@keyframes bubblePop {
from { opacity: 0; transform: scale(0.7); }
to   { opacity: 1; transform: scale(1); }
}
.is-romance #moko-popup .moko-say-bubble {
background: var(–gold);
color: #3a2000;
box-shadow: 0 4px 20px rgba(200,160,0,0.45);
}
.moko-popup-img {
width: 130px;
height: 130px;
object-fit: contain;
display: block;
margin: 0 auto;
}
/* ロマンスカー時：もころんに後光リング */
.moko-halo-ring {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
width: 140px; height: 140px;
border-radius: 50%;
border: 4px solid var(–gold);
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
animation: haloSpin 3s linear infinite;
}
@keyframes haloSpin { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
.is-romance #moko-popup .moko-halo-ring { opacity: 1; }
.moko-img-wrap { position: relative; display: inline-block; }
</style>

</head>
<body>
<div id="root">

<!-- START -->

<div id="pg-start" class="scr on">
  <div class="stars" id="stars"></div>
  <div class="s-head">
    <div class="s-badge">おだきゅうせん</div>
    <h1 class="s-title">おだきゅう<br>でんしゃのたび<small>まちだ &rarr; しんじゅく</small></h1>
  </div>
  <div class="s-scene">
    <div class="s-sky"></div>
    <div class="s-gnd"></div>
    <div class="s-rail"></div>
    <div class="s-train" id="sTrain"></div>
  </div>
  <div class="s-foot">
    <button class="btn-start" id="btnStart">&#x1F683; はじめる</button>
  </div>
</div>

<!-- MODE -->

<div id="pg-mode" class="scr">
  <div class="m-head">でんしゃを えらんでね<small>どっちに のる？</small></div>
  <div class="m-list">
    <button class="m-btn blue" id="btnK">
      <div class="m-name">かいそく</div>
      <div class="m-desc">ふつうの でんしゃ<br>みんなで のれるよ</div>
      <div class="m-icon">&#x1F683;</div>
    </button>
    <button class="m-btn purple" id="btnR">
      <div class="m-name">ロマンスカー</div>
      <div class="m-desc">とくべつな でんしゃ<br>キラキラ だよ</div>
      <div class="m-icon">&#x1F31F;</div>
    </button>
  </div>
</div>

<!-- QUESTION -->

<div id="pg-question" class="scr">
  <div class="q-scene">
    <div class="q-sky"  id="qSky"></div>
    <div class="q-sun"  id="qSun"></div>
    <div class="q-cloud qc1"></div>
    <div class="q-cloud qc2"></div>
    <div class="q-blds" id="qBlds"></div>
    <div class="q-gnd"  id="qGnd"></div>
    <div class="q-rail"></div>
    <div class="q-train" id="qTrain"></div>
  </div>
  <div class="q-now">
    <div class="q-dot"></div>
    <span class="q-now-lbl">いま：</span>
    <span class="q-now-nm" id="qNow"></span>
  </div>
  <div class="q-body">
    <div class="q-card">
      <div class="q-clabel">つぎの えきは？</div>
      <div class="q-ctext" id="qText"></div>
    </div>
    <div class="q-choices" id="qChoices"></div>
  </div>
</div>

<!-- DEPARTURE -->

<div id="pg-depart" class="scr">
  <div class="d-scene">
    <div class="d-sky" id="dSky"></div>
    <div class="d-gnd"></div>
    <div class="d-rail"></div>
    <div class="d-train" id="dTrain"></div>
  </div>
  <div class="d-shuppatsu">しゅっぱつ！！</div>
  <div class="d-next" id="dNext">つぎは しんゆりがおか</div>
</div>

<!-- ARRIVAL -->

<div id="pg-arrive" class="scr">
  <div class="a-emoji" id="aEmoji">&#x1F338;</div>
  <div class="a-label">とうちゃく！</div>
  <div class="a-name"  id="aName">しんゆりがおか</div>
  <div class="a-sub"   id="aSub"></div>
</div>

<!-- GOAL -->

<div id="pg-goal" class="scr">
  <div class="g-fw" id="gFW"></div>
  <div class="g-top">
    <div class="g-moko-wrap">
      <img class="g-moko-img" id="gMokoImg"
           src="https://www.odakyu.jp/oyako/assets/img/mocoron/img-mocoron01@2x.png?date=230821"
           alt="もころん" crossorigin="anonymous" />
    </div>
    <div class="g-moko-say" id="gMokoSay">やったね！</div>
    <div class="g-ttl">ゴール！</div>
    <div class="g-sub">しんじゅく に とうちゃく！</div>
  </div>
  <div class="g-stamps" id="gStamps"></div>
  <div class="g-foot">
    <button class="btn-retry" id="btnRetry">&#x1F504; もういちど！</button>
  </div>
</div>

<!-- キラキラ -->

<div id="sp"></div>

<!-- もころんポップアップ（正解時） -->

<div id="moko-popup">
  <div class="moko-say-bubble" id="mokoSay">せいかい！</div>
  <div class="moko-img-wrap">
    <div class="moko-halo-ring"></div>
    <img class="moko-popup-img"
         src="https://www.odakyu.jp/oyako/assets/img/mocoron/img-mocoron01@2x.png?date=230821"
         alt="もころん" crossorigin="anonymous" />
  </div>
</div>

</div><!-- #root -->

<script>
(function() {
  "use strict";

  function eid(id) { return document.getElementById(id); }

  var PAGES = ['pg-start','pg-mode','pg-question','pg-depart','pg-arrive','pg-goal'];
  function go(id) {
    for (var i = 0; i < PAGES.length; i++) eid(PAGES[i]).classList.remove('on');
    eid(id).classList.add('on');
  }

  /* DATA */
  var ST = [
    { n:'まちだ',         e:'&#x1F3D9;&#xFE0F;', sky:'linear-gradient(180deg,#78c0e8,#aad8f8 65%,#cce8ff)', gnd:'linear-gradient(#6ab84a,#4a9e2a)', b:false },
    { n:'しんゆりがおか', e:'&#x1F338;',          sky:'linear-gradient(180deg,#90d0f0,#bce4f8 65%,#d8f0ff)', gnd:'linear-gradient(#5aaa3a,#3a8e1a)', b:true  },
    { n:'のぼりと',       e:'&#x1F30A;',          sky:'linear-gradient(180deg,#a8d8f8,#cce8ff 65%,#e4f4ff)', gnd:'linear-gradient(#48961a,#287a08)', b:true  },
    { n:'しもきたざわ',   e:'&#x1F3B5;',          sky:'linear-gradient(180deg,#b8c8e8,#ccd8f0 65%,#dde8f8)', gnd:'linear-gradient(#909098,#707078)', b:true  },
    { n:'よよぎうえはら', e:'&#x1F306;',          sky:'linear-gradient(180deg,#e0c8a8,#ecd8b8 65%,#f8ecd0)', gnd:'linear-gradient(#808090,#606070)', b:true  },
    { n:'しんじゅく',     e:'&#x1F31F;',          sky:'linear-gradient(180deg,#181830,#242448 65%,#303060)', gnd:'linear-gradient(#585868,#383848)', b:true  }
  ];
  var QS = [
    { si:0, q:'まちだの つぎは どこ？',         a:0, cs:['しんゆりがおか','たまがわがくえんまえ','さがみおおの'] },
    { si:1, q:'しんゆりがおかの つぎは どこ？', a:0, cs:['のぼりと','よみうりランドまえ','むこうがおかゆえん'] },
    { si:2, q:'のぼりとの つぎは どこ？',       a:2, cs:['きたみ','せいじょうがくえんまえ','しもきたざわ'] },
    { si:3, q:'しもきたざわの つぎは どこ？',   a:1, cs:['だいたばし','よよぎうえはら','さんぐうばし'] },
    { si:4, q:'よよぎうえはらの つぎは どこ？', a:0, cs:['しんじゅく','はらじゅく','よよぎ'] }
  ];

  /* もころん セリフ */
  var MOKO_K = ['せいかい！','いいね！','すごい！','やった！'];
  var MOKO_R = ['かんぺき！','さすが！','スゴイ！','ピカイチ！'];
  var mokoTimer = null;

  function showMokoron(isR) {
    var says = isR ? MOKO_R : MOKO_K;
    eid('mokoSay').textContent = says[Math.floor(Math.random() * says.length)];

    /* ロマンスカー時は別カットを使う */
    var imgEl = eid('moko-popup').querySelector('.moko-popup-img');
    if (isR) {
      imgEl.src = 'https://www.odakyu.jp/oyako/assets/img/mocoron/img-mocoron03@2x.png?date=230822';
    } else {
      imgEl.src = 'https://www.odakyu.jp/oyako/assets/img/mocoron/img-mocoron01@2x.png?date=230821';
    }

    var popup = eid('moko-popup');
    popup.classList.add('show');
    if (mokoTimer) clearTimeout(mokoTimer);
    mokoTimer = setTimeout(function() {
      popup.classList.remove('show');
    }, 1300);
  }

  /* AUDIO */
  var _ac = null;
  function getAC() {
    if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    return _ac;
  }
  function tone(f, t, d, v, tp) {
    v = v || 0.27; tp = tp || 'sine';
    try {
      var ctx = getAC(); if (!ctx) return;
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = tp;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(v, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + d);
      o.start(t); o.stop(t + d);
    } catch(e) {}
  }
  function sndOk()      { var ctx=getAC(); if(!ctx)return; var t=ctx.currentTime; var ff=[880,1100,1320,1760]; for(var i=0;i<ff.length;i++) tone(ff[i],t+i*0.12,0.34); }
  function sndNg()      { var ctx=getAC(); if(!ctx)return; tone(250,ctx.currentTime,0.32,0.22,'sawtooth'); }
  function sndDepart()  { var ctx=getAC(); if(!ctx)return; var t=ctx.currentTime; var ff=[523,659,784,1047,784,659,523]; for(var i=0;i<ff.length;i++) tone(ff[i],t+i*0.14,0.46); }
  function sndRomance() { var ctx=getAC(); if(!ctx)return; var t=ctx.currentTime; var ff=[523,659,784,1047,1319,1047,784,523]; for(var i=0;i<ff.length;i++) tone(ff[i],t+i*0.17,0.65,0.22); }
  function sndGoal() {
    var ctx=getAC(); if(!ctx)return; var t=ctx.currentTime;
    var notes=[{f:523,d:0.15},{f:523,d:0.15},{f:523,d:0.15},{f:659,d:0.5},{f:784,d:0.15},{f:784,d:0.15},{f:784,d:0.15},{f:1047,d:0.9}];
    var s=0; for(var i=0;i<notes.length;i++){tone(notes[i].f,t+s,0.4,0.3,'triangle');s+=notes[i].d;}
  }

  /* TRAIN */
  function mkTrain(isR, n) {
    n = n || 4; var cls = isR?'r':'k'; var html='';
    for (var i=0;i<n;i++){
      var head=(i===0); var w=head?66:57;
      html+='<div class="tc '+cls+'"><div class="tb" style="width:'+w+'px;height:40px">';
      if(head) html+='<div class="tnose '+cls+'"></div>';
      html+='<div class="tw-r"><div class="tw"></div><div class="tw"></div>';
      if(!head) html+='<div class="tw"></div>';
      html+='</div><div class="tst"></div></div>';
      html+='<div class="tws"><div class="tw2"></div><div class="tw2"></div></div></div>';
    }
    return html;
  }

  /* SPARKLES */
  var SP_K=['&#x2728;','&#x2B50;','&#x1F31F;','&#x1F4AB;','&#x1F389;','&#x1F38A;'];
  var SP_R=['&#x2728;','&#x2B50;','&#x1F31F;','&#x1F4AB;','&#x1F451;','&#x1F48E;','&#x1F38A;'];
  function sparkle(n, isR) {
    var layer=eid('sp'); var em=isR?SP_R:SP_K;
    for(var i=0;i<n;i++){
      var el=document.createElement('div'); el.className='sp'; el.innerHTML=em[Math.floor(Math.random()*em.length)];
      el.style.left=(5+Math.random()*90)+'%'; el.style.top=(8+Math.random()*84)+'%';
      el.style.fontSize=(18+Math.random()*34)+'px';
      el.style.animationDelay=(Math.random()*0.6)+'s'; el.style.animationDuration=(0.9+Math.random()*0.9)+'s';
      layer.appendChild(el);
      el.addEventListener('animationend',function(ev){if(ev.target.parentNode)ev.target.parentNode.removeChild(ev.target);});
    }
  }

  /* SCENE */
  function applyScene(idx) {
    var s=ST[idx];
    eid('qSky').style.background=s.sky; eid('qGnd').style.background=s.gnd;
    eid('qSun').style.opacity=idx>=5?'0':'1';
    var blds=eid('qBlds'); blds.innerHTML='';
    if(s.b){
      var Hs=[36,58,40,66,44,56,32,70,48,40,62,36];
      var Ws=[24,20,28,16,26,20,22,18,30,20,24,20];
      var bg=['#c4d4e4','#b4c8e0','#d4e0ee'];
      for(var i=0;i<Hs.length;i++){
        var d=document.createElement('div'); d.className='q-bld';
        d.style.width=Ws[i]+'px'; d.style.height=Hs[i]+'px'; d.style.background=bg[i%3];
        blds.appendChild(d);
      }
      blds.style.opacity='1';
    } else { blds.style.opacity='0'; }
  }

  /* TOAST */
  function showToast(msg) {
    var el=document.createElement('div'); el.className='toast'; el.textContent=msg;
    document.body.appendChild(el);
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},920);
  }

  /* GAME */
  var mode='kaisoku', qi=0, lock=false;

  function setMode(m) {
    mode=m;
    if(m==='romance') eid('root').classList.add('is-romance');
    else eid('root').classList.remove('is-romance');
  }

  function onStart() { go('pg-mode'); }

  function onMode(m) {
    setMode(m); qi=0; lock=false;
    var isR=(m==='romance');
    eid('sTrain').innerHTML=mkTrain(isR,4);
    eid('qTrain').innerHTML=mkTrain(isR,4);
    eid('dTrain').innerHTML=mkTrain(isR,4);
    eid('dSky').style.background=ST[0].sky;
    applyScene(0); renderQ(); go('pg-question');
  }

  function renderQ() {
    var q=QS[qi];
    eid('qNow').textContent=ST[q.si].n;
    eid('qText').textContent=q.q;
    var icons=['&#x1F689;','&#x1F68A;','&#x1F68B;'];
    eid('qChoices').innerHTML='';
    for(var i=0;i<q.cs.length;i++){
      (function(idx){
        var btn=document.createElement('button'); btn.className='cbtn';
        var s1=document.createElement('span'); s1.className='c-icon'; s1.innerHTML=icons[idx];
        var s2=document.createElement('span'); s2.className='c-text'; s2.textContent=q.cs[idx];
        btn.appendChild(s1); btn.appendChild(s2);
        btn.addEventListener('click',function(){onAnswer(idx,btn);});
        eid('qChoices').appendChild(btn);
      })(i);
    }
    lock=false;
  }

  function onAnswer(idx, btn) {
    if(lock) return;
    var q=QS[qi];
    var all=document.querySelectorAll('.cbtn');
    for(var i=0;i<all.length;i++) all[i].style.pointerEvents='none';

    if(idx===q.a) {
      lock=true;
      btn.classList.add('ok');
      sndOk();
      /* 正解フロー:
         0ms   ボタン光る + ピンポーン
         180ms もころんぴょこん
         420ms キラキラ
         950ms 出発画面へ
      */
      setTimeout(function(){ showMokoron(mode==='romance'); }, 180);
      setTimeout(function(){ sparkle(mode==='romance'?32:20, mode==='romance'); }, 420);
      setTimeout(function(){ onDepart(); go('pg-depart'); }, 950);
    } else {
      btn.classList.add('ng');
      sndNg();
      showToast('おしい！');
      var cBtn=all[q.a];
      setTimeout(function(){ cBtn.classList.add('hint'); }, 360);
      setTimeout(function(){
        btn.classList.remove('ng'); cBtn.classList.remove('hint');
        for(var j=0;j<all.length;j++) all[j].style.pointerEvents='';
      }, 1050);
    }
  }

  function onDepart() {
    var next=ST[qi+1];
    eid('dNext').textContent='つぎは '+next.n;
    eid('dSky').style.background=ST[QS[qi].si].sky;
    var train=eid('dTrain');
    train.style.transition='none'; train.style.transform='translateX(-140%)';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        train.style.transition='transform 1.7s cubic-bezier(0.28,0.08,0.42,1)';
        train.style.transform='translateX(140%)';
      });
    });
    if(mode==='romance'){ sndRomance(); } else { sndDepart(); }
    sparkle(mode==='romance'?24:14, mode==='romance');
    setTimeout(function(){ onArrive(); go('pg-arrive'); }, 2200);
  }

  function onArrive() {
    qi++;
    var st=ST[qi];
    eid('aEmoji').innerHTML=st.e; eid('aName').textContent=st.n;
    var isLast=(qi>=QS.length);
    eid('aSub').textContent=isLast?'ゴールだよ！':'つぎの もんだいへ…';
    applyScene(qi);
    var delay=isLast?2600:2300;
    setTimeout(function(){
      if(isLast){ onGoal(); go('pg-goal'); }
      else { renderQ(); go('pg-question'); }
    }, delay);
  }

  function onGoal() {
    var isR=(mode==='romance');
    /* ゴール画面のもころん画像 */
    var gImg=eid('gMokoImg');
    gImg.src=isR
      ? 'https://www.odakyu.jp/oyako/assets/img/mocoron/img-mocoron03@2x.png?date=230822'
      : 'https://www.odakyu.jp/oyako/assets/img/mocoron/img-mocoron01@2x.png?date=230821';
    eid('gMokoSay').textContent=isR?'かんぺき！':'やったね！';

    var wrap=eid('gStamps'); wrap.innerHTML='';
    for(var i=0;i<ST.length;i++){
      var item=document.createElement('div'); item.className='g-stamp';
      var nm=ST[i].n.length>4?ST[i].n.slice(0,4):ST[i].n;
      item.innerHTML='<div class="g-box">'+ST[i].e+'</div><div class="g-sname">'+nm+'</div>';
      wrap.appendChild(item);
    }
    sndGoal();
    sparkle(isR?52:30, isR);
    fireworks(isR);
  }

  function fireworks(isR) {
    var fw=eid('gFW'); fw.innerHTML='';
    var cols=isR
      ?['#ffd700','#ff44ee','#ff4040','#ffe000','#ff88aa','#c8a200','#ffffff']
      :['#ff4040','#40ff80','#4080ff','#ffe000','#ff40e0','#40e8d8','#ffd700'];
    var iv=setInterval(function(){
      var el=document.createElement('div'); el.className='fw';
      var sz=12+Math.random()*30;
      el.style.width=sz+'px'; el.style.height=sz+'px';
      el.style.left=(Math.random()*100)+'%'; el.style.top=(Math.random()*75)+'%';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1+Math.random()*0.8)+'s'; el.style.animationDelay=(Math.random()*0.4)+'s';
      fw.appendChild(el);
      el.addEventListener('animationend',function(ev){if(ev.target.parentNode)ev.target.parentNode.removeChild(ev.target);});
    }, isR?180:230);
    setTimeout(function(){ clearInterval(iv); }, isR?7000:5800);
  }

  function onRetry() { eid('root').classList.remove('is-romance'); go('pg-start'); }

  /* INIT */
  eid('btnStart').addEventListener('click', onStart);
  eid('btnK').addEventListener('click', function(){ onMode('kaisoku'); });
  eid('btnR').addEventListener('click', function(){ onMode('romance'); });
  eid('btnRetry').addEventListener('click', onRetry);

  var wrap=eid('stars');
  for(var i=0;i<38;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=Math.random()*3+1;
    s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.top=(Math.random()*92)+'%'; s.style.left=(Math.random()*100)+'%';
    s.style.animationDelay=(Math.random()*2.2)+'s'; s.style.animationDuration=(1.4+Math.random()*2)+'s';
    wrap.appendChild(s);
  }
  eid('sTrain').innerHTML=mkTrain(false,4);
  document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

})();
</script>

</body>
</html>
