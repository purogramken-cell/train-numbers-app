<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="おだきゅうのたび">
<meta name="theme-color" content="#003087">
<title>おだきゅう でんしゃのたび</title>
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ============================================================
   RESET & BASE
============================================================ */
:root {
  --blue:  #003087;
  --blue2: #0057b8;
  --green: #10b981;
  --red:   #ef4444;
  --gold:  #ffd700;
  --dark:  #1a1a2e;
  --gray:  #6b7280;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 20px);
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none; user-select: none;
}
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
body {
  font-family: 'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN','BIZ UDPGothic',sans-serif;
  display: flex; justify-content: center;
}
#app { width: 100%; max-width: 430px; height: 100dvh; position: relative; overflow: hidden; }

/* ============================================================
SCREEN SYSTEM
============================================================ */
.screen {
position: absolute; inset: 0;
display: flex; flex-direction: column; align-items: center;
opacity: 0; pointer-events: none;
transition: opacity 0.32s ease;
}
.screen.active { opacity: 1; pointer-events: auto; }
.screen.pop-in { animation: popIn .36s ease forwards; }
@keyframes popIn {
from { opacity: 0; transform: scale(.96) translateY(12px); }
to   { opacity: 1; transform: scale(1)   translateY(0); }
}

/* ============================================================
① START SCREEN
============================================================ */
#s-start {
background: linear-gradient(170deg, #001040 0%, #003087 50%, #0057b8 100%);
justify-content: space-between;
padding-top: calc(var(–st) + 28px);
padding-bottom: calc(var(–sb) + 36px);
}
.start-stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.star {
position: absolute; background: #fff; border-radius: 50%;
animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
from { opacity: .2; transform: scale(1); }
to   { opacity: 1;  transform: scale(1.5); }
}

.start-top { text-align: center; z-index: 1; padding: 0 28px; }
.start-badge {
display: inline-block;
background: rgba(255,255,255,.13); border: 1.5px solid rgba(255,255,255,.28);
border-radius: 100px; padding: 7px 22px;
color: rgba(255,255,255,.8); font-size: 11px; font-weight: 700; letter-spacing: 3px;
margin-bottom: 22px;
}
.start-title {
color: #fff; font-size: 36px; font-weight: 900; line-height: 1.22;
text-shadow: 0 4px 28px rgba(0,0,0,.4);
}
.start-title small {
display: block; font-size: 16px; font-weight: 600;
opacity: .72; letter-spacing: 2px; margin-top: 8px;
}

.start-scene {
width: 100%; height: 160px; position: relative; overflow: hidden; flex-shrink: 0; z-index: 1;
}
.s-ground { position: absolute; bottom: 0; left: 0; right: 0; height: 42px; background: linear-gradient(#5cb85c,#4a9e30); }
.s-rail   { position: absolute; bottom: 30px; left: 0; right: 0; height: 8px; background: #8a7a6a; }
.s-rail::before {
content: ‘’; position: absolute; inset: 2px 0;
background: repeating-linear-gradient(90deg, rgba(255,255,255,.3) 0 14px, transparent 14px 27px);
}
.s-train-wrap {
position: absolute; bottom: 38px; left: 50%; transform: translateX(-50%);
animation: trainBob 2.5s ease-in-out infinite;
}
@keyframes trainBob {
0%,100% { transform: translateX(-50%) translateY(0); }
50%     { transform: translateX(-50%) translateY(-6px); }
}

.start-bottom { width: 100%; padding: 0 24px; z-index: 1; }
.btn-start {
width: 100%; padding: 24px;
background: #fff; color: var(–blue);
border: none; border-radius: 26px;
font-size: 26px; font-weight: 900; letter-spacing: 2px;
box-shadow: 0 12px 44px rgba(0,0,0,.38);
cursor: pointer; transition: transform .1s, box-shadow .1s;
}
.btn-start:active { transform: scale(.96); box-shadow: 0 4px 16px rgba(0,0,0,.3); }

/* ============================================================
② MODE SELECT
============================================================ */
#s-mode {
background: #f0f4fb;
padding-top: calc(var(–st) + 40px);
padding-bottom: calc(var(–sb) + 28px);
gap: 28px;
}
.mode-head { text-align: center; padding: 0 24px; }
.mode-head h2 { font-size: 28px; font-weight: 900; color: var(–blue); }
.mode-head p  { font-size: 15px; color: var(–gray); font-weight: 600; margin-top: 6px; }

.mode-cards { display: flex; flex-direction: column; gap: 18px; width: 100%; padding: 0 22px; flex: 1; justify-content: center; }
.mode-card {
border: none; border-radius: 28px; padding: 34px 28px;
cursor: pointer; text-align: left; position: relative; overflow: hidden;
transition: transform .12s, box-shadow .12s;
}
.mode-card:active { transform: scale(.95); }
.mode-card.kaisoku {
background: linear-gradient(135deg, #003087 0%, #0057b8 100%);
box-shadow: 0 14px 44px rgba(0,48,135,.38);
}
.mode-card.romance {
background: linear-gradient(135deg, #2d0057 0%, #6b0080 50%, #8b0000 100%);
box-shadow: 0 14px 44px rgba(45,0,87,.48);
}
.mc-title { color: #fff; font-size: 34px; font-weight: 900; }
.mc-desc  { color: rgba(255,255,255,.72); font-size: 14px; font-weight: 600; margin-top: 8px; line-height: 1.55; }
.mc-emoji { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); font-size: 68px; opacity: .22; }
.romance .mc-title { color: var(–gold); }

/* ============================================================
③ QUESTION SCREEN
============================================================ */
#s-question { background: #f0f4fb; justify-content: flex-start; }

/* 電車シーン */
.q-scene { width: 100%; height: 190px; position: relative; overflow: hidden; flex-shrink: 0; }
.q-sky   { position: absolute; inset: 0; transition: background 1s ease; }
.q-sun   {
position: absolute; top: 18px; right: 28px;
width: 46px; height: 46px; border-radius: 50%;
background: radial-gradient(circle,#ffd700,#ffa500);
box-shadow: 0 0 30px rgba(255,215,0,.6);
transition: opacity .8s;
}
.q-cloud { position: absolute; background: #fff; border-radius: 50px; opacity: .85; }
.q-cloud::before, .q-cloud::after { content:’’; position:absolute; background:#fff; border-radius:50%; }
.qc1 { width:72px;height:25px; top:20px; animation:cMove 23s linear infinite; }
.qc1::before{width:38px;height:38px;top:-18px;left:8px;}
.qc1::after {width:28px;height:28px;top:-14px;left:32px;}
.qc2 { width:52px;height:19px; top:50px;opacity:.6; animation:cMove 31s linear infinite 7s; }
.qc2::before{width:28px;height:28px;top:-14px;left:6px;}
@keyframes cMove { from{transform:translateX(-120px);} to{transform:translateX(540px);} }

.q-buildings {
position:absolute; bottom:52px; left:0; right:0; height:72px;
display:flex; align-items:flex-end; gap:2px; padding:0 8px; transition:opacity .8s;
}
.q-bld { border-radius: 3px 3px 0 0; flex-shrink: 0; }
.q-ground { position:absolute; bottom:0; left:0; right:0; height:52px; transition:background .8s; }
.q-rail   { position:absolute; bottom:18px; left:0; right:0; height:8px; background:#8a7a6a; }
.q-rail::before {
content:’’; position:absolute; inset:2px 0;
background:repeating-linear-gradient(90deg,rgba(255,255,255,.3) 0 14px,transparent 14px 27px);
}
.q-train  { position:absolute; bottom:26px; display:flex; gap:2px; z-index:10; }

/* いま表示バー */
.q-now {
width:100%; padding: 11px 20px 9px;
background: #fff; flex-shrink:0;
display:flex; align-items:center; gap:10px;
border-bottom: 2px solid #e4eaf5;
}
.q-now-dot {
width:10px; height:10px; border-radius:50%;
background:var(–blue); flex-shrink:0;
animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.q-now-label { font-size:14px; color:var(–gray); font-weight:700; }
.q-now-name  { font-size:20px; font-weight:900; color:var(–blue); }

/* 問題エリア */
.q-body {
flex:1; width:100%;
display:flex; flex-direction:column;
padding:16px 16px calc(var(–sb) + 14px);
gap:12px; overflow:hidden;
}
.q-card {
background:#fff; border-radius:22px;
padding:20px 22px; flex-shrink:0;
box-shadow:0 4px 18px rgba(0,48,135,.09);
}
.q-card-label { font-size:11px; color:var(–blue); font-weight:800; opacity:.65; letter-spacing:1px; margin-bottom:7px; }
.q-card-text  { font-size:27px; font-weight:900; color:var(–dark); line-height:1.35; }

/* 選択肢 */
.q-choices { display:flex; flex-direction:column; gap:10px; flex:1; justify-content:center; }
.choice-btn {
width:100%; min-height:84px;
background:#fff; border:3px solid #dde8f8; border-radius:22px;
font-size:22px; font-weight:900; color:var(–dark);
cursor:pointer;
display:flex; align-items:center; justify-content:center; gap:14px;
box-shadow:0 7px 0 #bfcfe8;
transition:transform .08s, box-shadow .08s, background .14s, border-color .14s;
-webkit-tap-highlight-color:transparent;
}
.choice-btn:active { transform:translateY(6px); box-shadow:0 1px 0 #bfcfe8; }
.choice-btn.correct {
background:#d1f5e8; border-color:var(–green); color:#065f46;
box-shadow:0 7px 0 #68cda0, 0 0 0 5px rgba(16,185,129,.22);
animation:bCorrect .42s ease forwards;
}
@keyframes bCorrect {
0%  {transform:scale(1) translateY(0);}
32% {transform:scale(1.07) translateY(-5px);}
65% {transform:scale(1.03) translateY(0);}
100%{transform:scale(1.03) translateY(0);}
}
.choice-btn.wrong {
background:#fff0f0; border-color:#ffb0b0; color:#991b1b;
box-shadow:0 7px 0 #ffb0b0;
animation:bWrong .42s ease;
}
@keyframes bWrong {
0%,100%{transform:translateX(0);}
22%{transform:translateX(-11px);}
44%{transform:translateX(11px);}
66%{transform:translateX(-6px);}
88%{transform:translateX(6px);}
}
.choice-btn.hint { background:#f0faf5; border-color:#a7dfc5; }
/* ロマンスカー */
.is-romance .choice-btn { border-color:rgba(201,162,39,.4); box-shadow:0 7px 0 #7a5800; }
.is-romance .choice-btn.correct {
background:#fff8d4; border-color:var(–gold); color:#4a3200;
box-shadow:0 7px 0 #c9a227, 0 0 0 5px rgba(201,162,39,.28);
}
.c-icon {font-size:24px;flex-shrink:0;}
.c-text {flex:1;text-align:center;line-height:1.2;}

/* ============================================================
④ DEPARTURE SCREEN
============================================================ */
#s-depart {
background:linear-gradient(170deg,#001040 0%,#003087 60%,#0057b8 100%);
justify-content:center; gap:0;
}
.is-romance #s-depart {
background:linear-gradient(170deg,#1a0030 0%,#3d0060 60%,#8b0000 100%) !important;
}
.d-scene { width:100%; height:200px; position:relative; overflow:hidden; flex-shrink:0; }
.d-rail  { position:absolute; bottom:20px; left:0; right:0; height:8px; background:#8a7a6a; }
.d-train {
position:absolute; bottom:28px; display:flex; gap:2px;
animation:dRun 1.9s cubic-bezier(.38,0,1,1) forwards;
transform:translateX(-50%); left:50%;
}
@keyframes dRun {
from { left:50%; transform:translateX(-50%); }
to   { left:130%; transform:translateX(0); }
}

.d-text {
font-size:72px; font-weight:900; color:#fff;
letter-spacing:4px; text-align:center;
text-shadow:0 4px 32px rgba(0,0,0,.4);
animation:textPop .5s cubic-bezier(.34,1.56,.64,1);
z-index:1; line-height:1; margin-top:8px;
}
@keyframes textPop {
from{transform:scale(.15);opacity:0;}
to  {transform:scale(1);opacity:1;}
}
.is-romance .d-text { color:var(–gold); text-shadow:0 0 44px rgba(255,215,0,.75); }
.d-sub { font-size:18px; font-weight:700; color:rgba(255,255,255,.75); letter-spacing:2px; margin-top:14px; z-index:1; }

/* ============================================================
⑤ ARRIVAL SCREEN
============================================================ */
#s-arrive {
background:linear-gradient(170deg,#001040 0%,#003087 100%);
justify-content:center; gap:0;
}
.a-emoji {
font-size:92px; line-height:1;
animation:stampDrop .48s cubic-bezier(.34,1.56,.64,1) .15s both;
}
@keyframes stampDrop {
from{transform:scale(0) rotate(-22deg);opacity:0;}
to  {transform:scale(1) rotate(0deg);opacity:1;}
}
.a-label { font-size:14px; color:rgba(255,255,255,.6); font-weight:700; letter-spacing:3px; margin-top:22px; animation:fadeUp .4s .4s both; }
.a-name  { font-size:46px; font-weight:900; color:#fff; letter-spacing:1px; margin-top:6px; animation:fadeUp .4s .55s both; text-shadow:0 4px 20px rgba(0,0,0,.3); }
.a-sub   { font-size:15px; color:rgba(255,255,255,.65); font-weight:600; margin-top:6px; animation:fadeUp .4s .68s both; }
@keyframes fadeUp {
from{transform:translateY(26px);opacity:0;}
to  {transform:translateY(0);opacity:1;}
}
.a-btn {
margin-top:44px; padding:20px 52px;
background:#fff; color:var(–blue);
border:none; border-radius:100px;
font-size:22px; font-weight:900; letter-spacing:1px;
box-shadow:0 12px 40px rgba(0,0,0,.3);
cursor:pointer; animation:fadeUp .4s .85s both; transition:transform .1s;
}
.a-btn:active {transform:scale(.96);}

/* ============================================================
⑥ GOAL SCREEN
============================================================ */
#s-goal {
background:linear-gradient(170deg,#001040 0%,#003087 55%,#0057b8 100%);
justify-content:space-between;
padding-top:calc(var(–st) + 28px);
padding-bottom:calc(var(–sb) + 32px);
}
.is-romance #s-goal {
background:linear-gradient(170deg,#1a0030 0%,#3d0060 55%,#8b0000 100%) !important;
}
.g-fw { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.fw-dot { position:absolute; border-radius:50%; animation:fwB 1.5s ease-out infinite; }
@keyframes fwB { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(6);opacity:0;} }

.g-top { text-align:center; z-index:1; padding:0 28px; }
.g-emoji {
font-size:84px; display:block;
animation:gBounce .7s cubic-bezier(.34,1.56,.64,1) .2s both;
}
@keyframes gBounce {
from{transform:scale(0) rotate(-20deg);}
to  {transform:scale(1) rotate(0deg);}
}
.g-title { font-size:52px; font-weight:900; color:#fff; margin-top:14px; animation:fadeUp .5s .6s both; text-shadow:0 4px 22px rgba(0,0,0,.3); }
.g-sub   { font-size:17px; color:rgba(255,255,255,.72); font-weight:600; margin-top:6px; animation:fadeUp .5s .75s both; }

.g-stamps { display:flex; gap:10px; justify-content:center; z-index:1; animation:fadeUp .5s .9s both; flex-wrap:wrap; padding:0 20px; }
.g-stamp  { display:flex; flex-direction:column; align-items:center; gap:4px; }
.g-stamp-box {
width:56px; height:56px; border-radius:15px;
background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.26);
display:flex; align-items:center; justify-content:center; font-size:28px;
}
.g-stamp-name { font-size:8px; color:rgba(255,255,255,.55); font-weight:700; text-align:center; }

.g-bottom { width:100%; padding:0 24px; z-index:1; animation:fadeUp .5s 1.1s both; }
.btn-restart {
width:100%; padding:24px;
background:#fff; color:var(–blue);
border:none; border-radius:26px;
font-size:24px; font-weight:900; letter-spacing:2px;
box-shadow:0 12px 42px rgba(0,0,0,.32);
cursor:pointer; transition:transform .1s;
}
.btn-restart:active {transform:scale(.96);}

/* ============================================================
TRAIN PARTS
============================================================ */
.t-car  { position:relative; display:flex; flex-direction:column; flex-shrink:0; }
.t-body { position:relative; border-radius:6px 6px 3px 3px; }
.t-wins { position:absolute; top:7px; left:4px; right:4px; display:flex; gap:3px; }
.t-win  { flex:1; height:11px; border-radius:2px; border:1px solid rgba(255,255,255,.35); }
.t-stripe { position:absolute; bottom:10px; left:0; right:0; height:5px; }
.t-wheels { display:flex; justify-content:space-around; padding:0 4px; margin-top:1px; }
.t-wheel  { width:10px; height:10px; background:#555; border-radius:50%; border:2px solid #888; }
.t-nose   { position:absolute; left:-11px; top:4px; width:13px; height:28px; border-radius:10px 0 0 5px; border-right:none; }
/* かいそく */
.k .t-body   { background:linear-gradient(180deg,#f0f0f0,#e0e0e0); border:1px solid #ccc; }
.k .t-stripe { background:#003087; }
.k .t-win    { background:rgba(135,206,235,.8); }
.k .t-nose   { background:linear-gradient(180deg,#f0f0f0,#ddd); border:1px solid #ccc; }
/* ロマンスカー */
.r .t-body   { background:linear-gradient(180deg,#c0392b,#922b21); border:1px solid #7b241c; }
.r .t-stripe { background:#ffd700; }
.r .t-win    { background:rgba(255,200,100,.45); }
.r .t-nose   { background:linear-gradient(180deg,#c0392b,#922b21); border:1px solid #7b241c; }

/* ============================================================
SPARKLES & TOAST
============================================================ */
#sp-layer { position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
.sparkle  {
position:absolute; pointer-events:none;
animation:spFly 1.1s ease-out forwards;
}
@keyframes spFly {
0%  {transform:scale(0) rotate(0deg);opacity:1;}
50% {transform:scale(1.7) rotate(180deg);opacity:1;}
100%{transform:scale(0) rotate(360deg) translateY(-90px);opacity:0;}
}
.wrong-toast {
position:fixed; top:50%; left:50%;
transform:translate(-50%,-50%);
background:var(–red); color:#fff;
font-size:34px; font-weight:900;
padding:16px 40px; border-radius:22px;
z-index:10000; pointer-events:none;
box-shadow:0 12px 44px rgba(239,68,68,.5);
animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes toastIn {
from{transform:translate(-50%,-50%) scale(.4);opacity:0;}
to  {transform:translate(-50%,-50%) scale(1);opacity:1;}
}
</style>

</head>
<body>
<div id="app">

  <!-- ① スタート -->

  <div id="s-start" class="screen active">
    <div class="start-stars" id="ss"></div>
    <div class="start-top">
      <div class="start-badge">おだきゅうせん</div>
      <h1 class="start-title">おだきゅう<br>でんしゃのたび<small>まちだ → しんじゅく</small></h1>
    </div>
    <div class="start-scene">
      <div class="s-ground"></div><div class="s-rail"></div>
      <div class="s-train-wrap" id="sTrain"></div>
    </div>
    <div class="start-bottom">
      <button class="btn-start" onclick="G.goMode()">🚃 はじめる</button>
    </div>
  </div>

  <!-- ② モード選択 -->

  <div id="s-mode" class="screen">
    <div class="mode-head"><h2>でんしゃを えらんでね</h2><p>どっちに のる？</p></div>
    <div class="mode-cards">
      <button class="mode-card kaisoku" onclick="G.start('kaisoku')">
        <div class="mc-title">かいそく</div>
        <div class="mc-desc">ふつうの でんしゃ<br>みんなで のれるよ</div>
        <div class="mc-emoji">🚃</div>
      </button>
      <button class="mode-card romance" onclick="G.start('romance')">
        <div class="mc-title">ロマンスカー</div>
        <div class="mc-desc">とくべつな でんしゃ<br>✨ キラキラ だよ ✨</div>
        <div class="mc-emoji">🌟</div>
      </button>
    </div>
  </div>

  <!-- ③ 問題 -->

  <div id="s-question" class="screen">
    <div class="q-scene" id="qScene">
      <div class="q-sky" id="qSky"></div>
      <div class="q-sun" id="qSun"></div>
      <div class="q-cloud qc1"></div><div class="q-cloud qc2"></div>
      <div class="q-buildings" id="qBld"></div>
      <div class="q-ground" id="qGnd"></div>
      <div class="q-rail"></div>
      <div class="q-train" id="qTrain" style="left:50%;transform:translateX(-50%)"></div>
    </div>
    <div class="q-now">
      <div class="q-now-dot"></div>
      <span class="q-now-label">いま：</span>
      <span class="q-now-name" id="qNow">まちだ</span>
    </div>
    <div class="q-body">
      <div class="q-card">
        <div class="q-card-label">つぎの えきは？</div>
        <div class="q-card-text" id="qText"></div>
      </div>
      <div class="q-choices" id="qChoices"></div>
    </div>
  </div>

  <!-- ④ 出発 -->

  <div id="s-depart" class="screen">
    <div class="d-scene">
      <div class="d-rail"></div>
      <div class="d-train" id="dTrain"></div>
    </div>
    <div class="d-text">しゅっぱつ！！</div>
    <div class="d-sub" id="dSub">つぎは しんゆりがおか</div>
  </div>

  <!-- ⑤ 到着 -->

  <div id="s-arrive" class="screen">
    <div class="a-emoji" id="aEmoji">🌸</div>
    <div class="a-label">とうちゃく！</div>
    <div class="a-name"  id="aName">しんゆりがおか</div>
    <div class="a-sub"   id="aSub">のぼりとへ しゅっぱつ！</div>
    <button class="a-btn" id="aBtn">つぎへ →</button>
  </div>

  <!-- ⑥ ゴール -->

  <div id="s-goal" class="screen">
    <div class="g-fw" id="gFW"></div>
    <div class="g-top">
      <span class="g-emoji" id="gEmoji">🎉</span>
      <div class="g-title">ゴール！</div>
      <div class="g-sub">しんじゅく に とうちゃく！</div>
    </div>
    <div class="g-stamps" id="gStamps"></div>
    <div class="g-bottom">
      <button class="btn-restart" onclick="G.restart()">🔄 もういちど！</button>
    </div>
  </div>

  <div id="sp-layer"></div>
</div>

<script>
/* ============================================================
   DATA
============================================================ */
const ST = [
  {name:'まちだ',        emoji:'🏙️', sky:'linear-gradient(180deg,#87ceeb,#b8d9f8 70%,#d4eaff)', gnd:'linear-gradient(#7ec850,#5a9e3d)', bld:false},
  {name:'しんゆりがおか',emoji:'🌸', sky:'linear-gradient(180deg,#98d8f0,#c5e8f8 70%,#e0f0ff)', gnd:'linear-gradient(#6ab84a,#4a9e30)', bld:true},
  {name:'のぼりと',      emoji:'🌊', sky:'linear-gradient(180deg,#b8d9f8,#d4eaff 70%,#eaf4ff)', gnd:'linear-gradient(#5da842,#3d8e28)', bld:true},
  {name:'しもきたざわ',  emoji:'🎵', sky:'linear-gradient(180deg,#c5d8f0,#d8e8f8 70%,#eaf2ff)', gnd:'linear-gradient(#a0a0b0,#808090)', bld:true},
  {name:'よよぎうえはら',emoji:'🌆', sky:'linear-gradient(180deg,#e8d5c0,#f0e0c8 70%,#fff0e0)', gnd:'linear-gradient(#888898,#686878)', bld:true},
  {name:'しんじゅく',    emoji:'🌟', sky:'linear-gradient(180deg,#1a1a3a,#2a2a5a 70%,#3a3a7a)', gnd:'linear-gradient(#606070,#404050)', bld:true},
];

const QS = [
  {si:0, text:'まちだの つぎは どこ？',        ans:0, cs:['しんゆりがおか','たまがわがくえんまえ','さがみおおの']},
  {si:1, text:'しんゆりがおかの つぎは どこ？', ans:0, cs:['のぼりと','よみうりランドまえ','むこうがおかゆえん']},
  {si:2, text:'のぼりとの つぎは どこ？',        ans:2, cs:['きたみ','せいじょうがくえんまえ','しもきたざわ']},
  {si:3, text:'しもきたざわの つぎは どこ？',    ans:1, cs:['だいたばし','よよぎうえはら','さんぐうばし']},
  {si:4, text:'よよぎうえはらの つぎは どこ？',  ans:0, cs:['しんじゅく','はらじゅく','よよぎ']},
];

/* ============================================================
   AUDIO
============================================================ */
let _ac;
const ac = () => { if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)(); return _ac; };
function tone(f,t,d,v=.27,tp='sine'){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=f; o.type=tp;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v,t+.04);
    g.gain.exponentialRampToValueAtTime(.001,t+d);
    o.start(t); o.stop(t+d);
  }catch(e){}
}
const snd = {
  pinpon:  ()=>{ const t=ac().currentTime; [880,1100,1320,1760].forEach((f,i)=>tone(f,t+i*.12,.3)); },
  wrong:   ()=>{ tone(280,ac().currentTime,.32,.2,'sawtooth'); },
  depart:  ()=>{ const t=ac().currentTime; [523,659,784,1047,784,659,523].forEach((f,i)=>tone(f,t+i*.14,.45)); },
  romance: ()=>{ const t=ac().currentTime; [523,659,784,1047,1319,1047,784,523].forEach((f,i)=>tone(f,t+i*.17,.65,.2)); },
  goal:    ()=>{
    const t=ac().currentTime;
    [{f:523,d:.15},{f:523,d:.15},{f:523,d:.15},{f:659,d:.5},{f:784,d:.15},{f:784,d:.15},{f:784,d:.15},{f:1047,d:.9}]
      .reduce((s,{f,d})=>{tone(f,t+s,.4,.28,'triangle');return s+d;},0);
  },
};

/* ============================================================
   TRAIN BUILDER
============================================================ */
function mkTrain(isR, n=4) {
  const cl = isR?'r':'k';
  return Array.from({length:n},(_,i)=>{
    const head=i===0, w=head?62:55, h=38;
    return `<div class="t-car ${cl}">
      <div class="t-body" style="width:${w}px;height:${h}px">
        ${head?`<div class="t-nose ${cl}"></div>`:''}
        <div class="t-wins"><div class="t-win"></div><div class="t-win"></div>${!head?'<div class="t-win"></div>':''}</div>
        <div class="t-stripe"></div>
      </div>
      <div class="t-wheels"><div class="t-wheel"></div><div class="t-wheel"></div></div>
    </div>`;
  }).join('');
}

/* ============================================================
   SPARKLES
============================================================ */
function sparkle(n=18, rom=false) {
  const layer = document.getElementById('sp-layer');
  const em = rom ? ['✨','⭐','🌟','💫','👑','💎'] : ['✨','⭐','🌟','💫','🎉','🎊'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='sparkle';
    el.textContent=em[Math.floor(Math.random()*em.length)];
    el.style.cssText=`left:${6+Math.random()*88}%;top:${12+Math.random()*76}%;font-size:${18+Math.random()*30}px;animation-delay:${Math.random()*.5}s;animation-duration:${.9+Math.random()*.85}s;`;
    layer.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

/* ============================================================
   SCENE
============================================================ */
function applyScene(idx) {
  const s = ST[idx];
  const sky=_('qSky'), gnd=_('qGnd'), bld=_('qBld'), sun=_('qSun');
  if(sky) sky.style.background=s.sky;
  if(gnd) gnd.style.background=s.gnd;
  if(sun) sun.style.opacity = idx>=5?'0':'1';
  if(!bld) return;
  bld.innerHTML='';
  if(s.bld){
    const Hs=[38,60,42,68,46,58,34,72,50,42,65,38];
    const Ws=[26,20,30,17,28,22,24,19,32,20,26,22];
    Hs.forEach((h,i)=>{
      const d=document.createElement('div');
      d.className='q-bld';
      d.style.cssText=`width:${Ws[i]}px;height:${h}px;background:${['#c8d8e8','#b8cce0','#d8e4f0'][i%3]}`;
      bld.appendChild(d);
    });
    bld.style.opacity='1';
  } else {
    bld.style.opacity='0';
  }
}

/* ============================================================
   SHOW SCREEN
============================================================ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','pop-in'));
  const t=_(id);
  t.classList.add('active','pop-in');
}
const _ = id => document.getElementById(id);

/* ============================================================
   GAME
============================================================ */
const G = (()=>{
  let mode='kaisoku', qi=0, busy=false;

  function applyMode(){
    const app=_('app');
    mode==='romance' ? app.classList.add('is-romance') : app.classList.remove('is-romance');
  }

  function goMode(){ show('s-mode'); }

  function start(m){
    mode=m; qi=0; busy=false;
    applyMode();
    const isR=mode==='romance';
    ['sTrain','qTrain','dTrain'].forEach(id=>{
      const el=_(id); if(el) el.innerHTML=mkTrain(isR,4);
    });
    applyScene(0);
    renderQ();
    show('s-question');
  }

  function renderQ(){
    const q=QS[qi];
    _('qNow').textContent = ST[q.si].name;
    _('qText').textContent = q.text;
    const icons=['🚉','🚊','🚋'];
    _('qChoices').innerHTML='';
    q.cs.forEach((c,i)=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.innerHTML=`<span class="c-icon">${icons[i]}</span><span class="c-text">${c}</span>`;
      btn.addEventListener('click',()=>answer(i,btn));
      _('qChoices').appendChild(btn);
    });
    busy=false;
  }

  function answer(idx,btn){
    if(busy) return;
    const q=QS[qi];
    const all=document.querySelectorAll('.choice-btn');
    all.forEach(b=>b.style.pointerEvents='none');

    if(idx===q.ans){
      busy=true;
      btn.classList.add('correct');
      snd.pinpon();
      sparkle(22, mode==='romance');
      setTimeout(()=>goDepart(), 780);
    } else {
      btn.classList.add('wrong');
      snd.wrong();
      showWrong();
      setTimeout(()=>all[q.ans].classList.add('hint'),320);
      setTimeout(()=>{
        btn.classList.remove('wrong');
        all[q.ans].classList.remove('hint');
        all.forEach(b=>b.style.pointerEvents='');
      }, 980);
    }
  }

  function showWrong(){
    const el=document.createElement('div');
    el.className='wrong-toast'; el.textContent='おしい！';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),880);
  }

  function goDepart(){
    const next=ST[qi+1];
    _('dSub').textContent = 'つぎは ' + next.name;
    show('s-depart');
    mode==='romance' ? snd.romance() : snd.depart();
    sparkle(mode==='romance'?30:16, mode==='romance');
    setTimeout(()=>goArrive(), 2300);
  }

  function goArrive(){
    qi++;
    const st=ST[qi];
    _('aEmoji').textContent=st.emoji;
    _('aName').textContent=st.name;
    const isLast = qi>=QS.length;
    _('aSub').textContent = isLast ? 'ゴールだよ！🎉' : 'つぎの えきへ でかけよう！';
    _('aBtn').textContent = isLast ? '🎉 ゴール！' : 'つぎへ →';
    _('aBtn').onclick = isLast ? goGoal : ()=>{ applyScene(qi); renderQ(); show('s-question'); };
    applyScene(qi);
    show('s-arrive');
  }

  function goGoal(){
    _('gEmoji').textContent = mode==='romance'?'🌟':'🎉';
    const wrap=_('gStamps'); wrap.innerHTML='';
    ST.forEach(s=>{
      wrap.innerHTML+=`<div class="g-stamp"><div class="g-stamp-box">${s.emoji}</div><div class="g-stamp-name">${s.name.length>4?s.name.slice(0,4):s.name}</div></div>`;
    });
    show('s-goal');
    snd.goal();
    sparkle(mode==='romance'?36:24, mode==='romance');
    startFW();
  }

  function startFW(){
    const fw=_('gFW');
    const cols=['#ff4444','#44ff88','#4488ff','#ffdd00','#ff44ff','#44eecc','#ffd700'];
    const iv=setInterval(()=>{
      const el=document.createElement('div');
      el.className='fw-dot';
      const sz=16+Math.random()*28;
      el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*68}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;`;
      fw.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    },250);
    setTimeout(()=>clearInterval(iv),5200);
  }

  function restart(){
    _('app').classList.remove('is-romance');
    show('s-start');
  }

  return {goMode, start, restart};
})();

/* ============================================================
   INIT
============================================================ */
(()=>{
  // 星
  const wrap=_('ss');
  for(let i=0;i<34;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*88}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s;`;
    wrap.appendChild(s);
  }
  _('sTrain').innerHTML=mkTrain(false,4);
  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

  // PWA SW インライン登録
  if('serviceWorker' in navigator){
    const sw=`const V='v3';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k))))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
  }
})();
</script>

</body>
</html>
